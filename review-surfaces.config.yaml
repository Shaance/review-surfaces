schema_version: review-surfaces.config.v1
output_dir: .review-surfaces
specs:
  - features/**/*.feature.yaml
docs:
  - README.md
  - CONTRIBUTING.md
  - AGENTS.md
  - CLAUDE.md
  - docs/**/*.md
  - .agents/skills/**/SKILL.md
tests:
  - tests/**/*.test.ts
areas:
  - id: SUB-CLI
    name: CLI orchestration
    group_key: CLI
    prefixes:
      - src/cli/
      - src/pipeline/
      - bin/
      - package.json
    purpose: Parse commands and wire local pipeline stages.
    pattern: command dispatcher
    test_keywords:
      - cli
  - id: SUB-COLLECT
    name: Collection and indexing
    group_key: COLLECTOR
    prefixes:
      - src/collector/
      - src/acai/
      - src/core/
      - src/commands/
      - src/indexer/
      - src/tests-evidence/
    purpose: Collect Git, diff, docs, tests, and input indexes.
    pattern: deterministic collector
    test_keywords:
      - acai
      - collect
      - command
  - id: SUB-BOOTSTRAP
    name: Bootstrap files
    group_key: BOOTSTRAP
    prefixes:
      - README.md
      - AGENTS.md
      - CLAUDE.md
      - .gitignore
      - .agents/
      - features/
      - docs/review-surfaces-trd.md
      - docs/history/OPEN_SOURCE_UPLIFT_GOAL.md
      - docs/history/POLISH_UPLIFT_GOAL.md
      - docs/history/QUICK_WINS_UPLIFT_GOAL.md
      - docs/history/CI_TRUST_UPLIFT_GOAL.md
      - LICENSE
      - CONTRIBUTING.md
      - review-surfaces.config.yaml
      - src/config/
      - src/bootstrap/
      - scripts/copy-env.sh
      - scripts/SECRETS.md
      - types/
    purpose: Keep local source-of-truth and agent workflow files available.
    pattern: spec-first bootstrap
    test_keywords:
      - config
      - bootstrap
      - init
  - id: SUB-INTENT
    name: Intent builder
    group_key: INTENT
    prefixes:
      - src/intent/
    purpose: Build requirements and source-backed intent.
    pattern: deterministic synthesis
    test_keywords:
      - intent
  - id: SUB-EVAL
    name: Evaluator
    group_key: EVAL
    prefixes:
      - src/evaluation/
      - src/scope/
    purpose: Map intent requirements to implementation and test evidence (incl. the PR diff-scope mapping).
    pattern: evidence classifier
    test_keywords:
      - eval
      - evaluation
  - id: SUB-RISK
    name: Risk analyzer
    group_key: RISK
    prefixes:
      - src/risks/
    purpose: Summarize risks, test evidence, gaps, and review focus.
    pattern: risk register
    test_keywords:
      - risk
      - risks
  - id: SUB-DIAGRAM
    name: Diagram generator
    group_key: ARCH
    prefixes:
      - src/diagrams/
      - architecture.md
    purpose: Generate Mermaid diagrams and subsystem cards.
    pattern: artifact renderer
    test_keywords:
      - arch
      - diagram
      - diagrams
  - id: SUB-METH
    name: Methodology auditor
    group_key: METHODOLOGY
    prefixes:
      - src/methodology/
    purpose: Normalize conversation logs and process evidence.
    pattern: log normalizer
    test_keywords:
      - method
      - methodology
  - id: SUB-LLM
    name: Optional enrichment
    group_key: EVIDENCE
    prefixes:
      - src/llm/
    purpose: Optionally enrich packet summaries through mock, AI SDK, or agent files without treating them as proof.
    pattern: bounded optional adapter
    test_keywords:
      - llm
      - provider
  - id: SUB-EVIDENCE
    name: Evidence and schema validation
    group_key: EVIDENCE
    prefixes:
      - src/evidence/
      - src/schema/
      - src/review-areas/
      - src/pr/
    purpose: Represent and validate evidence references and packet/PR-surface contracts used by packet claims.
    pattern: evidence model
    test_keywords:
      - areas
      - evidence
      - evaluation
  - id: SUB-PROVIDERS
    name: Provider and PR comment adapters
    group_key: PROVIDERS
    prefixes:
      - .github/workflows/
      - src/cli/index.ts
      - src/llm/
      - src/pipeline/pr-surface.ts
      - src/render/pr-comment.ts
    purpose: Keep code-hosting and LLM-backed PR comment adapters optional, bounded, and safe.
    pattern: optional provider boundary
    test_keywords:
      - provider
      - narrative
      - pr-surface
  - id: SUB-PRIVACY
    name: Privacy controls
    group_key: PRIVACY
    prefixes:
      - .review-surfacesignore
      - .env.example
      - src/privacy/
    purpose: Exclude sensitive files and prepare redaction boundaries before remote provider use.
    pattern: privacy guard
    test_keywords:
      - privacy
  - id: SUB-DOGFOOD
    name: Dogfood loop
    group_key: DOGFOOD
    prefixes:
      - src/dogfood/
      - src/feedback/
      - .review-surfaces/agent_handoff.md
      - .review-surfaces/feedback/
      - docs/agent/execplans/
      - docs/dogfooding.md
      - .agents/skills/review-surfaces-dogfood-loop/
      - .agents/skills/composed-review-loop/
    purpose: Turn self-review findings into local product feedback and handoff.
    pattern: feedback loop
    test_keywords:
      - dogfood
      - feedback
  - id: SUB-RENDER
    name: Packet renderer
    group_key: RENDER
    prefixes:
      - src/render/
    purpose: Write JSON/YAML/Markdown packet artifacts.
    pattern: stable renderer
    test_keywords:
      - packet
      - render
      - rendering
  - id: SUB-HUMAN-REVIEW
    name: Human review cockpit
    group_key: HUMAN_REVIEW
    prefixes:
      - src/human/
      - src/pr/risk-metadata.ts
      - schemas/human_review.schema.json
      - tests/human-review.test.ts
      - docs/history/human-first-review-surfaces-comprehensive-feature-proposal.md
    purpose: Turn packet and PR-surface evidence into human-first review decisions, queues, questions, comments, and checks.
    pattern: decision surface renderer
    test_keywords:
      - human
      - review
  - id: SUB-HUMAN-TRUST
    name: Human reviewer trust
    group_key: HUMAN_TRUST
    prefixes:
      - src/human/
      - schemas/human_review.schema.json
      - tests/human-review.test.ts
      - docs/history/human-first-review-surfaces-comprehensive-feature-proposal.md
    purpose: Keep human review actions bounded, evidence-backed, conservative, and separate from untrusted LLM prose.
    pattern: trust-bounded decision surface
    test_keywords:
      - human
      - review
      - evidence
  - id: SUB-QUALITY
    name: Tests and fixtures
    group_key: QUALITY
    prefixes:
      - tests/
      - package.json
    purpose: Verify local parsing, evidence, providers, and packet behavior.
    pattern: fixture tests
    test_keywords: []
  - id: SUB-SCHEMA
    name: Packet schema
    group_key: SCHEMA
    prefixes:
      - schemas/
    purpose: Define machine-readable packet contracts.
    pattern: JSON schema
    test_keywords:
      - schema
privacy:
  ignore_file: .review-surfacesignore
  redact_secrets: true
llm:
  provider: mock
  model: null
  require_json_schema: true
diagrams:
  format: mermaid
render:
  mode: compact
  include_evidence_appendix: true
dogfood:
  enabled: true
  milestone: M5
quality_gate:
  # The human review value uplift (docs/history/human-review-value-uplift-proposal.md)
  # landed its spec entries ahead of their phased implementation, so each phase's
  # ACIDs were allowlisted here until that phase shipped. All five of those phases
  # landed, emptying the allowlist.
  #
  # The next-value uplift (docs/history/NEXT_VALUE_UPLIFT_GOAL.md, ideas 1-12)
  # promotes its spec entries the same way: Phase 0 stages every not-yet-shipped
  # ACID below, and each later phase removes its ACIDs from this allowlist in the
  # PR that ships them. The gate must be back to `allow_missing: []` when the
  # final phase lands.
  #
  # We keep max_missing at 0 and allowlist by ACID rather than raising max_missing:
  # an allowlisted ACID is excluded from the missing count, but an UNRELATED
  # requirement regressing to "missing" still trips the strict self-dogfood gate.
  max_missing: 0
  # The next-value uplift (docs/history/NEXT_VALUE_UPLIFT_GOAL.md) is fully shipped: all 33
  # staged ACIDs landed phase by phase and were removed as they shipped.
  #
  # The visual value uplift (docs/history/VISUAL_VALUE_UPLIFT_GOAL.md) is fully shipped:
  # all 24 staged ACIDs landed phase by phase and were removed as they shipped.
  #
  # The open-source readiness uplift (docs/history/OPEN_SOURCE_UPLIFT_GOAL.md) is fully
  # shipped: all nine staged ACIDs landed phase by phase and were removed as they shipped.
  #
  # The pre-publish polish uplift (docs/history/POLISH_UPLIFT_GOAL.md) is fully
  # shipped: all ten staged ACIDs landed phase by phase and were removed as
  # they shipped.
  #
  # The release quick-wins uplift (docs/history/QUICK_WINS_UPLIFT_GOAL.md) is
  # fully shipped: all eight staged ACIDs landed phase by phase and were
  # removed as they shipped.
  #
  # The ci-trust uplift (docs/history/CI_TRUST_UPLIFT_GOAL.md) follows the same convention:
  # Phase 0 stages every not-yet-shipped ACID below, and each later phase
  # removes its own ACIDs from this allowlist in the PR that ships them. The
  # gate must be back to `allow_missing: []` when the final phase (Phase 6)
  # lands. Grouped by phase:
  allow_missing:
    - review-surfaces.SCHEMA.4         # Phase 2 schema-strictness
    - review-surfaces.SCHEMA.5         # Phase 2
    - review-surfaces.SCHEMA.6         # Phase 2
    - review-surfaces.QUALITY_GATE.1   # Phase 3 quality-gate + CI surfaces
    - review-surfaces.QUALITY_GATE.2   # Phase 3
    - review-surfaces.QUALITY_GATE.3   # Phase 3
    - review-surfaces.ACTION_IO.1      # Phase 3
    - review-surfaces.ACTION_IO.2      # Phase 3
    - review-surfaces.ACTION_IO.3      # Phase 3
    - review-surfaces.DEP_FACTS.5      # Phase 3
    - review-surfaces.HUMAN_REVIEW.22  # Phase 5 human-render-polish
    - review-surfaces.HUMAN_REVIEW.23  # Phase 5
    - review-surfaces.PERF.1           # Phase 6 head-tree-perf
    - review-surfaces.PERF.2           # Phase 6
    - review-surfaces.DISTRIBUTION.14  # Phase 7 distribution-trim + docs
    - review-surfaces.DISTRIBUTION.15  # Phase 7
human_review:
  enabled: true
  default_entrypoint: true
  max_review_first: 20
  max_suggested_comments: 10
  max_questions: 10
  risk_lenses:
    api_contract: true
    security_privacy: true
    llm_trust_boundary: true
    test_evidence: true
    reviewer_ux: true
    cache_provenance: true
    supply_chain: true
    architecture: true
  required_manual_checks: []
