schema_version: review-surfaces.config.v1
output_dir: .review-surfaces
specs:
  - features/**/*.feature.yaml
docs:
  - README.md
  - README.bootstrap.md
  - AGENTS.md
  - CLAUDE.md
  - docs/**/*.md
  - .agents/skills/**/SKILL.md
tests:
  - tests/**/*.test.ts
areas:
  - id: SUB-CLI
    name: CLI orchestration
    group_key: CLI
    prefixes:
      - src/cli/
      - src/pipeline/
      - bin/
      - package.json
    purpose: Parse commands and wire local pipeline stages.
    pattern: command dispatcher
    test_keywords:
      - cli
  - id: SUB-COLLECT
    name: Collection and indexing
    group_key: COLLECTOR
    prefixes:
      - src/collector/
      - src/acai/
      - src/core/
      - src/commands/
      - src/indexer/
      - src/tests-evidence/
    purpose: Collect Git, diff, docs, tests, and input indexes.
    pattern: deterministic collector
    test_keywords:
      - acai
      - collect
      - command
  - id: SUB-BOOTSTRAP
    name: Bootstrap files
    group_key: BOOTSTRAP
    prefixes:
      - AGENTS.md
      - CLAUDE.md
      - .gitignore
      - .agents/
      - features/
      - docs/review-surfaces-trd.md
      - review-surfaces.config.yaml
      - src/config/
      - src/bootstrap/
      - scripts/copy-env.sh
      - scripts/SECRETS.md
      - types/
    purpose: Keep local source-of-truth and agent workflow files available.
    pattern: spec-first bootstrap
    test_keywords:
      - config
      - bootstrap
  - id: SUB-INTENT
    name: Intent builder
    group_key: INTENT
    prefixes:
      - src/intent/
    purpose: Build requirements and source-backed intent.
    pattern: deterministic synthesis
    test_keywords:
      - intent
  - id: SUB-EVAL
    name: Evaluator
    group_key: EVAL
    prefixes:
      - src/evaluation/
      - src/scope/
    purpose: Map intent requirements to implementation and test evidence (incl. the PR diff-scope mapping).
    pattern: evidence classifier
    test_keywords:
      - eval
      - evaluation
  - id: SUB-RISK
    name: Risk analyzer
    group_key: RISK
    prefixes:
      - src/risks/
    purpose: Summarize risks, test evidence, gaps, and review focus.
    pattern: risk register
    test_keywords:
      - risk
  - id: SUB-DIAGRAM
    name: Diagram generator
    group_key: ARCH
    prefixes:
      - src/diagrams/
      - architecture.md
    purpose: Generate Mermaid diagrams and subsystem cards.
    pattern: artifact renderer
    test_keywords:
      - arch
      - diagram
  - id: SUB-METH
    name: Methodology auditor
    group_key: METHODOLOGY
    prefixes:
      - src/methodology/
    purpose: Normalize conversation logs and process evidence.
    pattern: log normalizer
    test_keywords:
      - method
  - id: SUB-LLM
    name: Optional enrichment
    group_key: EVIDENCE
    prefixes:
      - src/llm/
    purpose: Optionally enrich packet summaries through mock, AI SDK, or agent files without treating them as proof.
    pattern: bounded optional adapter
    test_keywords:
      - llm
      - provider
  - id: SUB-EVIDENCE
    name: Evidence and schema validation
    group_key: EVIDENCE
    prefixes:
      - src/evidence/
      - src/schema/
      - src/review-areas/
      - src/pr/
    purpose: Represent and validate evidence references and packet/PR-surface contracts used by packet claims.
    pattern: evidence model
    test_keywords:
      - evidence
      - evaluation
  - id: SUB-PROVIDERS
    name: Provider and PR comment adapters
    group_key: PROVIDERS
    prefixes:
      - .github/workflows/
      - src/cli/index.ts
      - src/llm/
      - src/pipeline/pr-surface.ts
      - src/render/pr-comment.ts
    purpose: Keep code-hosting and LLM-backed PR comment adapters optional, bounded, and safe.
    pattern: optional provider boundary
    test_keywords:
      - provider
      - narrative
      - pr-surface
  - id: SUB-PRIVACY
    name: Privacy controls
    group_key: PRIVACY
    prefixes:
      - .review-surfacesignore
      - .env.example
      - src/privacy/
    purpose: Exclude sensitive files and prepare redaction boundaries before remote provider use.
    pattern: privacy guard
    test_keywords:
      - privacy
  - id: SUB-DOGFOOD
    name: Dogfood loop
    group_key: DOGFOOD
    prefixes:
      - src/dogfood/
      - src/feedback/
      - .review-surfaces/agent_handoff.md
      - .review-surfaces/feedback/
      - docs/dogfooding.md
      - .agents/skills/review-surfaces-dogfood-loop/
      - .agents/skills/composed-review-loop/
    purpose: Turn self-review findings into local product feedback and handoff.
    pattern: feedback loop
    test_keywords:
      - dogfood
      - feedback
  - id: SUB-RENDER
    name: Packet renderer
    group_key: RENDER
    prefixes:
      - src/render/
    purpose: Write JSON/YAML/Markdown packet artifacts.
    pattern: stable renderer
    test_keywords:
      - packet
      - render
  - id: SUB-QUALITY
    name: Tests and fixtures
    group_key: QUALITY
    prefixes:
      - tests/
      - package.json
    purpose: Verify local parsing, evidence, providers, and packet behavior.
    pattern: fixture tests
    test_keywords: []
  - id: SUB-SCHEMA
    name: Packet schema
    group_key: SCHEMA
    prefixes:
      - schemas/
    purpose: Define machine-readable packet contracts.
    pattern: JSON schema
    test_keywords:
      - schema
privacy:
  ignore_file: .review-surfacesignore
  redact_secrets: true
llm:
  provider: mock
  model: null
  require_json_schema: true
diagrams:
  format: mermaid
render:
  mode: compact
  include_evidence_appendix: true
dogfood:
  enabled: true
  milestone: M5
