    - This M4 slice adds deterministic Mermaid diagram validation, packet schema support for diagram_validation, and architecture Markdown validation output.
    - This M5 slice adds methodology claim evidence metadata, methodology-fed workflow risk focus, and richer handoff validation/deferral sections.
    - Simplify triad ran with read-only correctness, efficiency, and reuse tracks; fixes applied for unknown top-level flags, explicit conflict markers, custom --out transcript discovery, deterministic default transcript IDs, stream backpressure, and shared transcript constants.
    - Review hardening ran three full-diff cycles with tests, lint/typecheck, packet validation, whitespace checks, and fresh review; no unresolved actionable findings remained.
    - Deferred improvement: richer schema-bound provider-assisted intent synthesis remains later work.
    - Deferred improvement: a CLI command registry and shared CLI test harness would reduce maintenance drift but are not required for this slice.
    - Human review M1 dogfood promoted focused human gaps into questions/comments/test-plan items, added failed-validation and stale-sidecar correctness guards, added schema enum parity tests, and shared PR-risk title/queue metadata.
    - Deferred improvement: cache-hit human rendering still reparses already-validated packet/surface artifacts; fix in a focused cache helper cleanup.
    - Deferred improvement: extract shared bounded Markdown and sidecar schema-validation helpers after the human surface API settles.
    - Follow-up after PR #25: current-head Codex review comments must be inspected before autoland; this slice addresses all four comments from chatgpt-codex-connector on c64e9da8b2.
    - Follow-up validation also ran pnpm run test:fast and node --test dist/tests/human-review.test.js; these are recorded in notes to keep the bounded handoff validation list stable.
    - Follow-up simplify triad tightened PR queue path normalization and requires an explicit recorded conclusion that PR-controlled code cannot access secrets before clearing the CI secret-boundary blocker.
    - Human review hunk-anchor dogfood generated review_queue.md with a resolved hunk header for src/cli/index.ts, and recorded a follow-up that empty PR risk candidates still leave the queue too dependent on broad whole-packet risks.
    - PR #40 follow-up records command transcript head_sha, requires command manual-check evidence to match the current head, handles rename-side desired-rule coverage per matched path, and preserves concrete feedback-policy prompts when missing manual checks are folded.
    - PR #40 simplify triad found one real folded-policy ID formatting bug, one lazy-index cleanup, and one missing production-hop test; all three were addressed before pushing the follow-up.
    - PR #40 dogfood still reported untested_changed_impl review items for implementation files that have focused tests; FB-2026-06-09-001 records this as a future queue/risk matching improvement.
