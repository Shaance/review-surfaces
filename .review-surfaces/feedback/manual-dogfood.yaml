findings:
  - id: FB-2026-05-28-001
    category: evidence_quality
    severity: low
    affected_section: Requirement coverage
    finding: The branch now validates deterministic evidence references and can produce invalid_evidence for invalid source paths, but broad requirement coverage still reports many partial results because exact ACID-to-test mapping is intentionally conservative.
    desired_change: Continue adding focused fixture tests for the remaining partial and missing ACIDs instead of inflating coverage.
  - id: FB-2026-05-28-002
    category: agent_workflow
    severity: low
    affected_section: Worktree setup
    finding: The worktree E2E fixture previously copied a .git file from linked worktrees and broke git init in copied fixtures; the fixture copier now excludes both .git files and .git directories.
    desired_change: Keep worktree setup documented in AGENTS.md, CLAUDE.md, and scripts/SECRETS.md so future agents can reproduce local provider setup without private paths.
  - id: FB-2026-05-28-003
    category: evidence_quality
    severity: medium
    affected_section: Test evidence and gaps
    finding: review-surfaces.RISK.2 now has bounded command transcript ingestion via review-surfaces.COLLECTOR.7, and the dogfood packet shows transcript-backed test commands as direct evidence while feedback-recorded commands remain claimed or indirect.
    desired_change: Keep command transcript excerpts bounded and prefer transcript-backed evidence over feedback-only validation notes.
  - id: FB-2026-05-28-004
    category: agent_workflow
    severity: low
    affected_section: Architecture surfaces
    finding: Dogfood initially reported src/feedback/feedback.ts as overreach because the review-area map did not classify the new feedback ingestion module under review-surfaces.DOGFOOD.6.
    desired_change: Keep review-area mappings and tests updated whenever a new local pipeline module is added.
  - id: FB-2026-05-28-005
    category: usability
    severity: low
    affected_section: Command transcripts
    finding: The CLI now includes review-surfaces.CLI.7 via a run helper that records bounded local command transcript artifacts without manually assembling JSON.
    desired_change: Prefer review-surfaces run for future dogfood validation commands so test evidence can stay direct and reproducible.
  - id: FB-2026-05-28-006
    category: performance
    severity: low
    affected_section: Command transcripts
    finding: Command transcript indexing now returns source hashes from the indexing pass, so collection no longer reads transcript files a second time for manifest hashing.
    desired_change: Keep future transcript artifact transforms streaming or single-pass when practical.
  - id: FB-2026-05-28-007
    category: review_value
    severity: low
    affected_section: Intent
    finding: M2 intent extraction now records sparse-source and source-marked contradiction questions deterministically, but richer schema-bound provider-assisted synthesis is still deferred.
    desired_change: Add bounded intent enrichment later through the same provider-agnostic contract rather than making real LLM calls mandatory.
  - id: FB-2026-05-28-008
    category: evidence_quality
    severity: medium
    affected_section: Requirement coverage
    finding: M3 evaluator dogfood now distinguishes exact ACID-backed test evidence from broad test-path evidence, which reduces inflated satisfied counts and exposes more partial coverage instead of overstating proof.
    desired_change: Continue adding exact ACID fixture tests or explicit deferrals for high-value requirements, and keep the handoff milestone aligned with the active dogfood milestone.
  - id: FB-2026-05-28-009
    category: evidence_quality
    severity: medium
    affected_section: PR review
    finding: PR review found that exact evidence classification needed to use configured test inputs, exclude docs and skills from implementation proof, and allow test-only QUALITY requirements to be satisfied by exact test evidence.
    desired_change: Keep evaluator fixture coverage around configured test globs, documentation-only ACID mentions, and test-focused requirements before broadening satisfied coverage rules.
  - id: FB-2026-05-28-010
    category: diagram_quality
    severity: medium
    affected_section: Architecture surfaces
    finding: M4 adds deterministic Mermaid artifact validation so architecture outputs show whether generated diagrams are valid, invalid, or too noisy before a reviewer trusts them.
    desired_change: Keep diagram validation local and schema-backed, then use future dogfood runs to reduce noisy subsystem maps rather than adding provider-dependent diagram interpretation.
  - id: FB-2026-05-28-011
    category: agent_workflow
    severity: medium
    affected_section: Methodology and handoff
    finding: M5 should make methodology claims and agent handoff outputs distinguish transcript-backed validation from unverified claims, so future agents can continue without relying on hidden chat context.
    desired_change: Preserve verified methodology claims, unverified claims, validation evidence, failed validation, methodology flags, and deferrals in local packet and handoff artifacts.
  - id: FB-2026-06-08-001
    category: review_value
    severity: medium
    affected_section: Human review cockpit
    finding: M1 dogfood showed repo-mode human_review.md degraded readiness for missing evidence but generated no author questions and led with broad legacy test gaps.
    desired_change: Promote focused HUMAN_REVIEW and HUMAN_TRUST gaps into reviewer questions, suggested comments, and front-loaded test-plan items before generic packet gaps.
  - id: FB-2026-06-08-002
    category: correctness
    severity: high
    affected_section: Merge readiness
    finding: Simplify triad found that nonzero command transcript exits could avoid the test-failure blocker when summaries said "records exit 1" without fail/error wording.
    desired_change: Treat failed, invalid, or nonzero validation command evidence as a deterministic merge blocker and cover it with a focused human review test.
  - id: FB-2026-06-08-003
    category: evidence_quality
    severity: high
    affected_section: Human review sidecars
    finding: Simplify triad found that human --review-scope pr could combine a stale pr_review_surface.json sidecar with a newer review_packet.json.
    desired_change: Validate PR sidecar base/head metadata against the packet manifest before using it; ignore stale sidecars and ask the user to regenerate PR mode.
  - id: FB-2026-06-08-004
    category: maintainability
    severity: medium
    affected_section: Human review implementation
    finding: Simplify triad found duplicate schema enum contracts and duplicate PR risk title/ranking metadata around the new human review surface.
    desired_change: Keep human runtime constants aligned with schema enums through parity tests, and share PR risk display/ranking metadata rather than re-declaring it in the human builder.
  - id: FB-2026-06-08-005
    category: maintainability
    severity: low
    affected_section: Human review deferrals
    finding: Simplify triad found broader cleanup opportunities in cache-hit artifact parsing, shared Markdown helpers, and shared sidecar schema validation.
    desired_change: Defer these to a follow-up cache/render/helper cleanup slice because they are not required for the M1 human-review contract.
  - id: FB-2026-06-08-006
    category: agent_workflow
    severity: high
    affected_section: PR autoland
    finding: PR #25 was merged before the Codex COMMENTED review for the current head appeared, leaving four automated review comments unaddressed.
    desired_change: Treat a current-head Codex review result as part of the autoland gate; inspect thread-aware review comments before merging and push follow-up fixes when comments appear after CI.
  - id: FB-2026-06-08-007
    category: review_value
    severity: high
    affected_section: Human review cockpit
    finding: Codex review found PR-mode human queues could include whole-packet risks outside the PR diff, drop pathless PR risks instead of rendering them as questions, over-block passing tests whose names mention errors, and keep CI secret-boundary blockers impossible to clear after manual evidence is recorded.
    desired_change: Scope packet risks to PR changed files, render pathless PR risks as questions, classify failed validation only from missing/invalid evidence, and let recorded CI secret-boundary manual-check evidence clear the blocker and required manual test-plan item.
  - id: FB-2026-06-08-008
    category: review_value
    severity: medium
    affected_section: Human review queue
    finding: PR-scoped dogfood for the hunk-anchor slice showed the queue can resolve a diff hunk, but when deterministic PR risk candidates are empty it still falls back to a broad whole-packet risk instead of producing a precise changed-file review action.
    desired_change: Add deterministic human-review queue candidates for changed implementation files or affected human-review requirements when PR risks are empty, while keeping pathless or weakly-evidenced items in reviewer questions.
  - id: FB-2026-06-09-001
    category: evidence_quality
    severity: medium
    affected_section: Human review queue
    finding: PR #40 dogfood still ranked bin/review-surfaces.js, src/evidence/evidence.ts, and src/risks/risks.ts as untested implementation changes even though focused regression tests and a current-head command transcript exist for the provenance/manual-check behavior.
    desired_change: Teach PR risk generation or human-review queue ranking to connect focused changed tests and current-head command transcripts to changed implementation paths before surfacing untested_changed_impl as a review-first item.
  - id: FB-2026-06-10-001
    category: review_value
    severity: low
    affected_section: Requirement coverage
    finding: Next-value Phase 0 promotes brainstorm ideas 1-12 into 33 new ACIDs (PR_SURFACE, RANKING, COVERAGE, BUDGET, EVAL_HARNESS, DEP_FACTS, BLAST_RADIUS, CONFIG_FACTS, POLICY families plus RENDER.9-10 and INTENT.6-7) and stages them all in quality_gate.allow_missing. As a spec-only promotion phase it intentionally does not change the rendered human_review.md surface; the dogfood run confirms the strict gate still passes (exit 0) with the new not-yet-implemented requirements allowlisted, and the 33 new ACIDs evaluate as partial (doc-anchored) rather than tripping the gate.
    desired_change: No surface change is expected until Phase 1 ships PR_SURFACE; each later phase removes its ACIDs from the allowlist as it lands, returning the gate to allow_missing [] when the final phase merges.
