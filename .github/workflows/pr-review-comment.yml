name: pr-review-comment
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]

jobs:
  review-comment:
    # review-surfaces.PROVIDERS.6 + review-surfaces.PR_SURFACE.1
    # Base-controlled workflow: this file is evaluated from the target branch, so
    # PR code cannot alter the secret-bearing orchestration before merge. The
    # generation runs trusted tool code from the base ref (the composite action at
    # ./tool) against a credentialless PR subject checkout; PR-controlled
    # install/build code never receives the LLM key.
    #
    # SAME-REPO ONLY: this secret-bearing pull_request_target job posts the sticky
    # for same-repo PRs. Fork PRs are served by the ci.yml `pr-surface-smoke` job
    # on plain pull_request — deterministic mock, no secrets, post=false — which
    # uploads the artifact (review-surfaces.PR_SURFACE.3) without ever exposing the
    # write token or LLM key to fork-controlled code or comparing against a fork's
    # `origin/main`.
    if: github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: review-surfaces-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read # prior-sticky artifact lookup for the since-last-review delta
    steps:
      - name: Checkout trusted tool (base ref)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: tool
          fetch-depth: 1
          persist-credentials: false
      - name: Checkout PR subject (head ref, credentialless)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: subject
          fetch-depth: 0
          persist-credentials: false
      - name: Stage head-bound command evidence (download + validate, never execute PR code)
        # The unprivileged ci.yml records typecheck/tests through the tool and
        # uploads `command-evidence-<head sha>`. This privileged job only downloads
        # and validates transcripts stamped for the current head before rendering.
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DEST: subject/.review-surfaces/commands
        run: |
          set +e
          name="command-evidence-$HEAD_SHA"
          id=""
          for attempt in $(seq 1 20); do
            id="$(gh api --paginate "repos/$REPO/actions/artifacts?name=$name" \
              --jq '.artifacts[] | select(.expired==false) | .id' 2>/dev/null | head -n1)"
            case "$id" in [0-9]*) break ;; esac
            echo "command evidence not uploaded yet (attempt $attempt/20); waiting…"
            sleep 15
          done
          case "$id" in
            ""|*[!0-9]*) echo "No head-bound command evidence within the wait window; rendering without verified test transcripts."; exit 0 ;;
          esac
          tmp="$RUNNER_TEMP/cmd-ev"; rm -rf "$tmp"; mkdir -p "$tmp"
          if ! gh api "repos/$REPO/actions/artifacts/$id/zip" > "$RUNNER_TEMP/cmd-ev.zip" 2>/dev/null \
            || ! unzip -q -o "$RUNNER_TEMP/cmd-ev.zip" -d "$tmp" 2>/dev/null; then
            echo "Could not download/unzip command evidence (best-effort); rendering without it."; exit 0
          fi
          mkdir -p "$DEST"
          copied=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            ok="$(jq -r --arg sha "$HEAD_SHA" '
              ((.commands // .transcripts // [.]) | if type=="array" then . else [.] end)
              | all(.[]; (.head_sha // .headSha) == $sha)' "$f" 2>/dev/null)"
            if [ "$ok" = "true" ]; then
              cp "$f" "$DEST/"; copied=$((copied+1))
            else
              echo "Rejected $(basename "$f"): head_sha != $HEAD_SHA (stale or forged)."
            fi
          done < <(find "$tmp" -type f -name '*.json')
          echo "Validated and staged $copied head-bound command transcript file(s)."
          exit 0
      - name: review-surfaces PR surface (trusted action over credentialless subject)
        uses: ./tool
        with:
          provider: ai-sdk
          model: google:gemini-2.5-flash
          llm-api-key: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          base-ref: origin/${{ github.base_ref }}
          head-ref: HEAD
          change-title: ${{ github.event.pull_request.title }}
          change-description: ${{ github.event.pull_request.body }}
          spec: features/review-surfaces.feature.yaml
          output-dir: .review-surfaces
          subject-directory: subject
          pr-number: ${{ github.event.pull_request.number }}
          repository: ${{ github.repository }}
          post: "true"
          github-token: ${{ github.token }}
