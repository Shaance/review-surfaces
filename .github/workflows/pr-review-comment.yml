name: pr-review-comment
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review-comment:
    # review-surfaces.PROVIDERS.6 + review-surfaces.PR_SURFACE.1
    # Base-controlled workflow: this file is evaluated from the target branch, so
    # PR code cannot alter the secret-bearing orchestration before merge. The
    # generation runs trusted tool code from the base ref (the composite action at
    # ./tool) against a credentialless PR subject checkout; PR-controlled
    # install/build code never receives the LLM key.
    #
    # The repo-local workflow is a thin consumer of the published composite action
    # (one implementation, dogfooded here). Same-repo PRs get the ai-sdk narrative
    # enrichment + sticky post; fork PRs run the deterministic mock pipeline and
    # upload the artifact but never post and never receive the key.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read # prior-artifact lookup for the since-last-review delta
    steps:
      - name: Checkout trusted tool (base ref)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: tool
          fetch-depth: 1
          persist-credentials: false
      - name: Checkout PR subject (head ref, credentialless)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: subject
          fetch-depth: 0
          persist-credentials: false
      - name: review-surfaces PR surface (trusted action over credentialless subject)
        uses: ./tool
        with:
          provider: ${{ github.event.pull_request.head.repo.full_name == github.repository && 'ai-sdk' || 'mock' }}
          model: google:gemini-2.5-flash
          llm-api-key: ${{ github.event.pull_request.head.repo.full_name == github.repository && secrets.GOOGLE_GENERATIVE_AI_API_KEY || '' }}
          base-ref: origin/${{ github.base_ref }}
          head-ref: HEAD
          spec: features/review-surfaces.feature.yaml
          output-dir: .review-surfaces
          comment-top-n: "5"
          subject-directory: subject
          pr-number: ${{ github.event.pull_request.number }}
          repository: ${{ github.repository }}
          # Fork PRs upload the artifact but never post (review-surfaces.PR_SURFACE.3).
          post: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          github-token: ${{ github.token }}
