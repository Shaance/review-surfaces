name: pr-review-comment
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review-comment:
    # review-surfaces.PROVIDERS.6 + review-surfaces.PR_SURFACE.1
    # Base-controlled workflow: this file is evaluated from the target branch, so
    # PR code cannot alter the secret-bearing orchestration before merge. The
    # generation runs trusted tool code from the base ref (the composite action at
    # ./tool) against a credentialless PR subject checkout; PR-controlled
    # install/build code never receives the LLM key.
    #
    # SAME-REPO ONLY: this secret-bearing pull_request_target job posts the sticky
    # for same-repo PRs. Fork PRs are served by the ci.yml `pr-surface-smoke` job
    # on plain pull_request — deterministic mock, no secrets, post=false — which
    # uploads the artifact (review-surfaces.PR_SURFACE.3) without ever exposing the
    # write token or LLM key to fork-controlled code or comparing against a fork's
    # `origin/main`.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read # prior-sticky artifact lookup for the since-last-review delta
    steps:
      - name: Checkout trusted tool (base ref)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: tool
          fetch-depth: 1
          persist-credentials: false
      - name: Checkout PR subject (head ref, credentialless)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: subject
          fetch-depth: 0
          persist-credentials: false
      - name: review-surfaces PR surface (trusted action over credentialless subject)
        uses: ./tool
        with:
          provider: ai-sdk
          model: google:gemini-2.5-flash
          llm-api-key: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          base-ref: origin/${{ github.base_ref }}
          head-ref: HEAD
          spec: features/review-surfaces.feature.yaml
          output-dir: .review-surfaces
          comment-top-n: "5"
          subject-directory: subject
          pr-number: ${{ github.event.pull_request.number }}
          repository: ${{ github.repository }}
          post: "true"
          github-token: ${{ github.token }}
