name: pr-review-comment
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]

concurrency:
  group: review-surfaces-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  trusted-command-evidence:
    # This job may execute PR code, so it has no secrets, no write permission,
    # and no persisted checkout credential. The dependency-free recorder is
    # executed from the base checkout: a PR cannot forge a passing transcript
    # or its head binding.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout trusted tool (base ref)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: tool
          fetch-depth: 1
          persist-credentials: false
      - name: Checkout PR subject (head ref, credentialless)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: subject
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate subject in an isolated container (trusted recorder)
        working-directory: subject
        shell: bash
        run: |
          set -euo pipefail
          container="review-surfaces-subject-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          docker run --detach --rm \
            --name "$container" \
            --volume "$GITHUB_WORKSPACE/subject:/subject" \
            --workdir /subject \
            node:22-bookworm \
            tail -f /dev/null >/dev/null
          trap 'docker rm --force "$container" >/dev/null 2>&1 || true' EXIT
          docker exec "$container" bash -lc \
            'corepack enable && corepack prepare pnpm@10.8.0 --activate && pnpm install --frozen-lockfile'
          node "$GITHUB_WORKSPACE/tool/bin/review-surfaces.js" run \
            --command-transcripts "$RUNNER_TEMP/trusted-command-evidence" \
            --id ci-typecheck -- \
            docker exec "$container" pnpm run typecheck
          node "$GITHUB_WORKSPACE/tool/bin/review-surfaces.js" run \
            --command-transcripts "$RUNNER_TEMP/trusted-command-evidence" \
            --id ci-tests -- \
            docker exec "$container" pnpm test
      - name: Upload trusted exact-head command evidence
        uses: actions/upload-artifact@v4
        with:
          name: trusted-command-evidence-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/trusted-command-evidence/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  review-comment:
    # review-surfaces.PROVIDERS.6 + review-surfaces.PR_SURFACE.1
    # Base-controlled workflow: this file is evaluated from the target branch, so
    # PR code cannot alter the secret-bearing orchestration before merge. The
    # generation runs trusted tool code from the base ref (the composite action at
    # ./tool) against a credentialless PR subject checkout; PR-controlled
    # install/build code never receives the LLM key.
    #
    # SAME-REPO ONLY: this secret-bearing pull_request_target job posts the sticky
    # for same-repo PRs. Fork PRs are served by the ci.yml `pr-surface-smoke` job
    # on plain pull_request — deterministic mock, no secrets, post=false — which
    # uploads the artifact (review-surfaces.PR_SURFACE.3) without ever exposing the
    # write token or LLM key to fork-controlled code or comparing against a fork's
    # `origin/main`.
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs: trusted-command-evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read # prior-sticky artifact lookup for the since-last-review delta
    steps:
      - name: Checkout trusted tool (base ref)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: tool
          fetch-depth: 1
          persist-credentials: false
      - name: Checkout PR subject (head ref, credentialless)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: subject
          fetch-depth: 0
          persist-credentials: false
      - name: Download trusted exact-head command evidence
        uses: actions/download-artifact@v4
        with:
          name: trusted-command-evidence-${{ github.event.pull_request.head.sha }}
          path: subject/.review-surfaces/commands
      - name: review-surfaces PR surface (trusted action over credentialless subject)
        uses: ./tool
        with:
          provider: ai-sdk
          model: google:gemini-2.5-flash
          llm-api-key: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          base-ref: origin/${{ github.base_ref }}
          head-ref: HEAD
          change-title: ${{ github.event.pull_request.title }}
          change-description: ${{ github.event.pull_request.body }}
          spec: features/review-surfaces.feature.yaml
          output-dir: .review-surfaces
          subject-directory: subject
          pr-number: ${{ github.event.pull_request.number }}
          repository: ${{ github.repository }}
          post: "true"
          github-token: ${{ github.token }}
