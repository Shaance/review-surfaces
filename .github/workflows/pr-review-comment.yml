name: pr-review-comment
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review-comment:
    # review-surfaces.PROVIDERS.6
    # Base-controlled workflow: this file is evaluated from the target branch,
    # so same-repo PRs cannot alter the secret-bearing orchestration before merge.
    # The generation step still runs trusted tool code from the base ref against a
    # credentialless PR subject checkout; PR-controlled install/build code never
    # receives the LLM key.
    #
    # SAME-REPO ONLY: keep the initial provider path conservative while the PR
    # comment surface is still maturing. Fork PRs still get normal CI, but no
    # LLM-backed sticky comment.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout trusted tool
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: tool
          fetch-depth: 1
          persist-credentials: false
      - name: Checkout PR subject
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: subject
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tool/pnpm-lock.yaml
      - name: Build trusted tool
        working-directory: tool
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Generate PR review surface (trusted tool, LLM key)
        working-directory: subject
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: |
          node ../tool/bin/review-surfaces.js all \
            --provider ai-sdk \
            --model google:gemini-2.5-flash \
            --config "$GITHUB_WORKSPACE/tool/review-surfaces.config.yaml" \
            --redact-secrets true \
            --base "origin/${{ github.base_ref }}" \
            --head HEAD \
            --spec features/review-surfaces.feature.yaml \
            --dogfood \
            --review-scope pr \
            --out .review-surfaces
          node ../tool/bin/review-surfaces.js validate .review-surfaces
          if node -e 'const fs=require("node:fs"); const s=JSON.parse(fs.readFileSync(".review-surfaces/pr_review_surface.json","utf8")); if (s.status!=="ready" || !s.narrative || s.llm?.status!=="applied" || s.llm?.provider!=="ai-sdk") { console.error(`PR review surface not postable: ${s.status}/${s.blocked_reason ?? s.llm?.status}/${s.llm?.provider}`); process.exit(4); }'; then
            node ../tool/bin/review-surfaces.js comment --review-scope pr --format github --out .review-surfaces
          else
            echo "PR review surface is blocked; skipping sticky PR comment."
          fi
      - name: Upsert sticky comment (trusted gh, not PR code)
        # Only THIS step holds the write token, and it runs `gh` (trusted) over the
        # generated comment.md - never PR code - so a tampered CLI entrypoint
        # cannot reach the token. Best-effort: a missing/symlinked body or a
        # transient API failure must never fail the PR check.
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set +e # best-effort: never fail the PR check on a posting hiccup
          body=subject/.review-surfaces/comment.md
          # The previous step wrote this file from trusted tool code. Refuse to
          # hand `gh -F body=@` a SYMLINK or a path resolving OUTSIDE the
          # workspace: a symlink to e.g. /proc/self/environ would post the
          # GH_TOKEN as the body.
          if [ -z "$GITHUB_WORKSPACE" ] || [ -L "$body" ] || [ ! -f "$body" ]; then
            echo "comment.md missing or a symlink; skipping post (best-effort)"; exit 0
          fi
          case "$(realpath "$body" 2>/dev/null)" in
            "$GITHUB_WORKSPACE"/*) : ;;
            *) echo "comment.md resolves outside the workspace; skipping post"; exit 0 ;;
          esac
          marker='<!-- review-surfaces:sticky -->'
          first_line="$(head -n 1 "$body" 2>/dev/null)"
          if [ "$first_line" != "$marker" ]; then
            echo "comment.md missing sticky marker; skipping post"; exit 0
          fi
          # --slurp combines paginated pages into one array, then a standalone jq
          # selects the sticky id. (`gh api --slurp` is mutually exclusive with
          # `gh api --jq`, so the filter must be a separate jq process - otherwise
          # the command errors, the id is empty, and the upsert posts a duplicate
          # sticky every run instead of updating the existing one.)
          id="$(gh api --paginate --slurp "repos/$REPO/issues/$PR_NUMBER/comments" 2>/dev/null \
            | jq -r "[.[][] | select(.body | contains(\"$marker\")) | .id] | last // \"\"")"
          case "$id" in
            ""|*[!0-9]*) id="" ;;
          esac
          if [ -n "$id" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$id" -F "body=@$body" >/dev/null 2>&1 \
              && echo "updated sticky comment #$id" || echo "warning: sticky update failed (best-effort)"
          else
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" -F "body=@$body" >/dev/null 2>&1 \
              && echo "posted sticky comment" || echo "warning: sticky post failed (best-effort)"
          fi
          exit 0
