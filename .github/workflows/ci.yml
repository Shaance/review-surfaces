name: ci
on:
  pull_request:
  push:
    branches: [main]

env:
  REVIEW_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REVIEW_HEAD_SHA }}
          fetch-depth: 0 # need origin/main for --base origin/main
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Record typecheck + tests through the PR's own tool for the unprivileged
      # exact-head preview below. Privileged posting never trusts this artifact;
      # pr-review-comment.yml records its own evidence with base-controlled code.
      - name: Typecheck (recorded transcript)
        run: node bin/review-surfaces.js run --id ci-typecheck -- pnpm run typecheck
      - name: Tests (recorded transcript)
        run: node bin/review-surfaces.js run --id ci-tests -- pnpm test
      - name: Assert pack ships dist + schemas
        run: |
          out="$(npm pack --dry-run 2>&1)"
          echo "$out"
          echo "$out" | grep -q 'dist/src/cli/index.js' || { echo 'MISSING dist/src/cli/index.js in pack'; exit 1; }
          echo "$out" | grep -q 'schemas/review_packet.schema.json' || { echo 'MISSING schemas/review_packet.schema.json in pack'; exit 1; }
          echo "$out" | grep -q 'schemas/pr_review_surface.schema.json' || { echo 'MISSING schemas/pr_review_surface.schema.json in pack'; exit 1; }
      - name: Self-dogfood (mock, frozen clock)
        run: |
          node bin/review-surfaces.js all \
            --provider mock \
            --base origin/main \
            --head HEAD \
            --spec features/review-surfaces.feature.yaml \
            --dogfood \
            --strict \
            --now 2026-01-01T00:00:00Z \
            --out .review-surfaces
      - name: Validate emitted packet
        run: node bin/review-surfaces.js validate .review-surfaces
      - name: Determinism check
        run: ./scripts/determinism-check.sh
      - name: Upload preview command evidence (bound to the head SHA)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: preview-command-evidence-${{ env.REVIEW_HEAD_SHA }}
          path: .review-surfaces/commands/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  locale-invariance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Keep one required check on GitHub's synthetic merge result while
          # build-test records evidence against the exact PR head.
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate tr_TR.UTF-8 locale
        run: sudo locale-gen tr_TR.UTF-8 || sudo localedef -i tr_TR -f UTF-8 tr_TR.UTF-8 || true
      - name: Tests under LANG=C
        run: pnpm test
        env:
          LANG: C
          LC_ALL: C
      - name: Tests under Turkish locale (dotted-i hazard)
        run: pnpm test
        env:
          LANG: tr_TR.UTF-8
          LC_ALL: tr_TR.UTF-8

  review-comment:
    # Compatibility check only. The secret-bearing PR comment generation lives in
    # pr-review-comment.yml on pull_request_target so PR-controlled workflow YAML
    # never receives the LLM key.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: echo "LLM-backed PR comments run from the base-controlled pr-review-comment workflow."

  pr-surface-smoke:
    # review-surfaces.PR_SURFACE.1: dogfood the composite action live on the PR's
    # own code (mock, zero secrets, post=false) so its build/run/render/upload are
    # validated before the action goes live on main. Live POSTING is exercised by
    # the base-controlled pr-review-comment workflow post-merge (pull_request_target
    # always runs the base-branch workflow, so a PR cannot test its own posting).
    if: github.event_name == 'pull_request'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REVIEW_HEAD_SHA }}
          fetch-depth: 0 # need origin/main for --base origin/main
      - name: Download head-bound command evidence
        uses: actions/download-artifact@v4
        with:
          name: preview-command-evidence-${{ env.REVIEW_HEAD_SHA }}
          path: .review-surfaces/commands
      - name: Run the review-surfaces PR-surface action (mock, no post)
        uses: ./
        with:
          provider: mock
          base-ref: origin/main
          head-ref: ${{ env.REVIEW_HEAD_SHA }}
          output-dir: .review-surfaces
          subject-directory: .
          pr-number: ${{ github.event.pull_request.number }}
          post: "false"
      - name: Assert the sticky comment rendered
        env:
          EXPECTED_HEAD: ${{ env.REVIEW_HEAD_SHA }}
        run: |
          test -f .review-surfaces/comment.md
          head -n 1 .review-surfaces/comment.md | grep -qx '<!-- review-surfaces:sticky -->'
          grep -q "review-surfaces:fingerprint head=$EXPECTED_HEAD" .review-surfaces/comment.md
          test "$(jq -r '.generated_from.head_sha' .review-surfaces/human_review.json)" = "$EXPECTED_HEAD"
          jq -e --arg head "$EXPECTED_HEAD" '
            [.transcripts[] |
              select(.id == "ci-typecheck" or .id == "ci-tests") |
              select(.status == "passed" and .head_sha == $head)] |
            length == 2
          ' .review-surfaces/inputs/commands.json >/dev/null
