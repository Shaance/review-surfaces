name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need origin/main for --base origin/main
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test
      - name: Assert pack ships dist + schemas
        run: |
          out="$(npm pack --dry-run 2>&1)"
          echo "$out"
          echo "$out" | grep -q 'dist/src/cli/index.js' || { echo 'MISSING dist/src/cli/index.js in pack'; exit 1; }
          echo "$out" | grep -q 'schemas/review_packet.schema.json' || { echo 'MISSING schemas/review_packet.schema.json in pack'; exit 1; }
      - name: Self-dogfood (mock, frozen clock)
        run: |
          node bin/review-surfaces.js all \
            --provider mock \
            --base origin/main \
            --head HEAD \
            --spec features/review-surfaces.feature.yaml \
            --dogfood \
            --strict \
            --now 2026-01-01T00:00:00Z \
            --out .review-surfaces
      - name: Validate emitted packet
        run: node bin/review-surfaces.js validate .review-surfaces
      - name: Determinism check
        run: ./scripts/determinism-check.sh

  locale-invariance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate tr_TR.UTF-8 locale
        run: sudo locale-gen tr_TR.UTF-8 || sudo localedef -i tr_TR -f UTF-8 tr_TR.UTF-8 || true
      - name: Tests under LANG=C
        run: pnpm test
        env:
          LANG: C
          LC_ALL: C
      - name: Tests under Turkish locale (dotted-i hazard)
        run: pnpm test
        env:
          LANG: tr_TR.UTF-8
          LC_ALL: tr_TR.UTF-8

  review-comment:
    # Post the review-surfaces sticky comment (with GitHub-rendered Mermaid
    # architecture diagrams) on the PR. Checks out the HEAD branch so `gh pr view`
    # can resolve the PR — the default pull_request checkout is a detached merge
    # ref where it cannot. Best-effort: `comment --post` never fails the build.
    #
    # SAME-REPO ONLY: restricted to PRs whose head branch lives in THIS repo. Fork
    # PRs are skipped because (a) `github.head_ref` names a branch in the FORK, not
    # here, so a default-repo checkout would fail rather than skip, and (b) running
    # checked-out PR code while `GH_TOKEN` holds `pull-requests: write` is a token-
    # exfiltration risk for untrusted forks (a "pwn request"). Same-repo
    # contributors already have write access, so this escalates no privilege; fork
    # PRs simply don't get the diagram comment.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0 # all history so the base ref and the merge-base resolve
          persist-credentials: false # PR-controlled install/build must not get a token
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Generate review comment (PR code, NO token)
        # PR-controlled code runs here WITHOUT any token: it only writes the local
        # comment.md (+ packet). Diff against the PR's ACTUAL target branch
        # (github.base_ref), not a hard-coded main.
        run: |
          node bin/review-surfaces.js all \
            --provider mock \
            --base "origin/${{ github.base_ref }}" \
            --head HEAD \
            --spec features/review-surfaces.feature.yaml \
            --dogfood \
            --out .review-surfaces
          node bin/review-surfaces.js comment --format github --out .review-surfaces
      - name: Upsert sticky comment (trusted gh, not PR code)
        # Only THIS step holds the write token, and it runs `gh` (trusted) over the
        # PR-generated comment.md — never PR code — so a tampered CLI entrypoint
        # cannot reach the token. Upserts the single review-surfaces:sticky comment.
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          body=.review-surfaces/comment.md
          if [ ! -f "$body" ]; then
            echo "no comment.md generated; nothing to post"
            exit 0
          fi
          marker='<!-- review-surfaces:sticky -->'
          id="$(gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq "[.[] | select(.body | contains(\"$marker\")) | .id] | last // \"\"")"
          if [ -n "$id" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$id" -F "body=@$body" >/dev/null
            echo "updated sticky comment #$id"
          else
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" -F "body=@$body" >/dev/null
            echo "posted sticky comment"
          fi
