feature:
  name: todo
  product: todo-service
  version: "1.0.0"
components:
  API:
    name: Todo API
    requirements:
      1: The API must expose adding a todo with a non-empty title.
      2: The API must expose listing all todos.
  STORAGE:
    name: Todo storage
    requirements:
      1: The storage layer must persist inserted todos and assign ids.
constraints:
  QUALITY:
    name: Quality
    requirements:
      1: The service must have unit tests covering the API surface.
