feature:
  name: review-surfaces
  product: review-surfaces
  version: 0.1.0-bootstrap
  draft: true
  description: |
    Local-first review packet compiler for agent-generated code changes.
    It extracts intent from specs/docs/logs, evaluates implementation against intent,
    generates architecture review surfaces, audits methodology, computes risks/test gaps,
    and dogfoods itself during its own implementation.
  prerequisites:
    - The repository contains this Acai-compatible spec at features/review-surfaces.feature.yaml.
    - The repository contains AGENTS.md and .agents/skills/review-surfaces/SKILL.md for agent workflow.
    - Hosted Acai sync, CI, and PR/MR comments are later renderers; local artifacts are the MVP surface.

components:
  BOOTSTRAP:
    name: Spec-first repository bootstrap
    description: Initialize the repository so agents can start from stable local requirements instead of hidden chat context.
    requirements:
      1:
        requirement: The repository must contain this Acai-compatible feature spec at features/review-surfaces.feature.yaml.
        note: Implementation agents must preserve component IDs and requirement IDs in review packets, tests, and remediation notes where useful.
      2:
        requirement: The repository must contain AGENTS.md with the local development workflow, source-of-truth rules, dogfood rule, and fallback behavior before the CLI is complete.
      3:
        requirement: The repository must contain .agents/skills/review-surfaces/SKILL.md with skill metadata and a compact workflow for using review-surfaces while implementing review-surfaces.
      4:
        requirement: The bootstrap flow must treat any local coffee-agents setup as optional scaffolding, not as a product dependency.
        note: Public docs, tests, and code must not require private coffee-agents paths or scripts.
      5:
        requirement: The bootstrap command should create or validate AGENTS.md, the review-surfaces skill, config, schemas, and this feature spec.
        note: Missing bootstrap files should be created deterministically and be easy to review.
      6:
        requirement: The repository must contain .agents/skills/review-surfaces-usage/SKILL.md with a reusable workflow for running review-surfaces in any local repository.
        note: The skill must keep hosted comments, dashboards, and CI as later renderers over local .review-surfaces artifacts.

  CLI:
    name: Local-first CLI
    description: Commands needed before CI or PR/MR comment renderers exist.
    requirements:
      1:
        requirement: The CLI must expose init, bootstrap, collect, intent, evaluate, diagrams, methodology, risks, dogfood, handoff, packet, all, validate, and later comment commands.
        note: Commands may be stubs early, but help output and stable command names should exist.
      2:
        requirement: review-surfaces all must run the whole available local pipeline and write artifacts under .review-surfaces by default.
      3:
        requirement: Commands must avoid modifying repository files except for init/bootstrap or explicitly configured writes.
      4:
        requirement: Every command must support predictable exit codes for success, usage error, schema validation failure, evidence validation failure, privacy block, and optional quality gate failure.
      5:
        requirement: The CLI must support mock/offline operation so tests and dogfood runs do not require network access or a hosted LLM.
      6:
        requirement: The CLI must support dogfood mode with milestone, previous packet path, and feedback ingestion options.
      7:
        requirement: The CLI should provide a run helper that executes a local command and records a bounded command transcript artifact.
        note: The helper must keep local/offline operation, redact secrets, and avoid storing unbounded raw stdout or stderr.

  COLLECTOR:
    name: Input collection and indexing
    description: Deterministic collection of repository, spec, docs, tests, agent instruction, feedback, and conversation inputs.
    requirements:
      1:
        requirement: The collector must resolve base/head refs and write diff, changed files, commits, and manifest data.
      2:
        requirement: The collector must discover and index features/**/*.feature.yaml files.
        note: Acai IDs such as review-surfaces.INTENT.2 must be preserved in specs.index.json or acai.index.json.
      3:
        requirement: The collector must index README, docs, plans, AGENTS.md, and local skill files as source inputs.
      4:
        requirement: The collector must normalize supported conversation/tool logs into conversation.normalized.jsonl when supplied.
      5:
        requirement: Missing conversation logs must be recorded as missing evidence rather than causing fatal failure.
      6:
        requirement: The collector must support .review-surfacesignore and privacy exclusions before files are copied or sent to an LLM provider.
      7:
        requirement: The collector must ingest bounded local command transcript artifacts and write .review-surfaces/inputs/commands.json.
        note: Transcripted successful test commands may be treated as direct evidence; feedback-recorded commands remain claimed or indirect unless backed by a transcript.

  INTENT:
    name: Intent extraction
    description: Convert specs, docs, plans, tickets, and logs into a source-backed task intent.
    requirements:
      1:
        requirement: The intent builder must generate intent.yaml with summary, requirements, constraints, non-goals, assumptions, and open questions.
      2:
        requirement: Every generated requirement must cite at least one source or be explicitly marked as an assumption or open question.
      3:
        requirement: Acai requirement IDs must round-trip into intent.yaml.
      4:
        requirement: Contradictory or sparse sources must produce open questions rather than hallucinated goals.
      5:
        requirement: Intent extraction must be schema-bound and provider-agnostic.
        note: llm.mock should support deterministic tests.

  EVAL:
    name: Implementation evaluation
    description: Evaluate the diff against extracted intent and show requirement coverage.
    requirements:
      1:
        requirement: The evaluator must produce one requirement result per intent requirement.
      2:
        requirement: Requirement statuses must include satisfied, partial, missing, unknown, overreach, and invalid_evidence.
      3:
        requirement: The evaluator must map requirements to source, docs, tests, commands, diffs, logs, and spec evidence when available.
      4:
        requirement: The evaluator must detect underreach where a requirement lacks implementation or test evidence.
      5:
        requirement: The evaluator must detect overreach where changed files do not map to stated intent.
      6:
        requirement: The evaluator must produce Acai coverage metadata for Acai-backed requirements.

  ARCH:
    name: Architecture and diagrams
    description: Decompose changed work into high-level, subsystem, and interaction review surfaces.
    requirements:
      1:
        requirement: The tool must generate architecture.md with a high-level overview, changed subsystem map, per-subsystem cards, and diagrams.
      2:
        requirement: The first diagram format must be Mermaid, written under .review-surfaces/diagrams.
      3:
        requirement: Diagrams must be evidence-backed and review-sized, not visual-only guesses.
      4:
        requirement: Subsystem cards must include purpose, files, responsibilities, interactions, tests, risks, and relevant docs/specs.
      5:
        requirement: "Diagram generation should be hybrid: deterministic file/dependency grouping first, LLM labeling second."
      6:
        requirement: The diagram generator must validate generated Mermaid artifacts and report invalid or noisy diagrams in local architecture outputs.

  METHODOLOGY:
    name: Agent workflow audit
    description: Analyze raw conversation/tool logs to judge whether the workflow made sense.
    requirements:
      1:
        requirement: methodology.yaml must summarize considered options, research, decisions, unchallenged assumptions, skipped work, and quality flags.
      2:
        requirement: The auditor must separate agent claims from verified evidence.
      3:
        requirement: Claimed tests without command or test-output evidence must be flagged.
      4:
        requirement: Missing logs must produce a useful finding rather than a fatal error.
      5:
        requirement: Methodology findings must feed into risk analysis and review focus.

  RISK:
    name: Risk and test-gap analysis
    description: Compute review risk, tested areas, untested areas, and manual/automatic checks.
    requirements:
      1:
        requirement: risks.yaml must include a risk register, test evidence, test gaps, suggested checks, and review focus.
      2:
        requirement: The analyzer must distinguish direct test evidence, indirect test evidence, claimed evidence, and missing evidence.
      3:
        requirement: Risk scoring must preserve severity, likelihood, and detectability labels.
      4:
        requirement: Missing manual checks and missing automatic tests must be listed separately.
      5:
        requirement: Risk findings must cite evidence or be marked as hypotheses.

  DOGFOOD:
    name: Self-dogfooding loop
    description: Use review-surfaces to build and improve review-surfaces.
    requirements:
      1:
        requirement: Every milestone must run the strongest available subset of the tool against this repository.
        note: If a self-run cannot be produced yet, the reason must be recorded explicitly.
      2:
        requirement: dogfood.yaml must capture whether generated outputs helped the implementation agent and the human reviewer.
      3:
        requirement: Dogfood findings must be classified separately from implementation defects.
        note: Categories include usability, review_value, evidence_quality, agent_workflow, schema, diagram_quality, test_gap, and performance.
      4:
        requirement: Dogfood findings should propose remediation tasks or Acai spec updates when appropriate.
      5:
        requirement: agent_handoff.md must be generated from packet data for the next implementation agent.
      6:
        requirement: A human feedback file must be ingestible without requiring a hosted service.
        note: .review-surfaces/feedback/*.yaml should be read by review-surfaces dogfood.
      7:
        requirement: The product must include a dogfood-loop architecture diagram by milestone M4.
      8:
        requirement: The repository must contain .agents/skills/review-surfaces-dogfood-loop/SKILL.md with a self-improvement workflow for turning packet findings into code, tests, specs, docs, skills, feedback files, or explicit deferrals.
      9:
        requirement: The repository must contain .agents/skills/composed-review-loop/SKILL.md with a composed review workflow for combining packet evidence, command transcripts, dogfood findings, PR feedback, and a full-diff review into one readiness decision.
        note: Optional external review skills may be used when available, but the repo-local workflow must include generic fallbacks and must not depend on private local skill setup.

  RENDER:
    name: Packet rendering and machine-readable outputs
    description: Render structured outputs into human- and agent-readable review surfaces.
    requirements:
      1:
        requirement: review_packet.md must include summary, intent, requirement coverage, risks, diagrams, methodology, test gaps, dogfood findings, open questions, and an evidence appendix when available.
      2:
        requirement: review_packet.json must unify structured outputs for scripts and agents.
      3:
        requirement: review_packet.json must validate against schemas/review_packet.schema.json.
      4:
        requirement: Generated Markdown must support compact and full modes so human reviewers are not overwhelmed.
      5:
        requirement: Repo-mode PR/MR comments must remain a renderer over review_packet.json, while PR-mode comments must render from a separate PR-scoped sidecar artifact.
      6:
        requirement: PR-mode comments must avoid whole-spec coverage dumps, generic review-focus boilerplate, and static whole-repo diagrams.
      7:
        requirement: The CLI must support comment --mode pr|repo|auto and all --surface-mode pr|repo|auto.

  HUMAN_REVIEW:
    name: Human reviewer cockpit
    description: Convert packet evidence into an ordered review decision surface for human reviewers.
    requirements:
      1:
        requirement: The default human surface must start with a merge-readiness verdict, top blockers, and an ordered review queue.
        note: The verdict must be deterministic and derived from evidence, risks, coverage, tests, privacy state, and configured policy, not from untrusted LLM prose.
      2:
        requirement: Review queue items must cite changed files and, when available, diff hunks or line ranges.
        note: Queue items without path or hunk evidence must be rendered as general questions, not as main review-first items.
      3:
        requirement: The human surface must separate verified facts, author or agent claims, missing evidence, and invalid evidence.
        note: Claimed tests without command transcript or parsed test-output evidence must be visible near the top of the surface.
      4:
        requirement: The human surface must generate reviewer questions for ambiguous intent, missing evidence, coverage regressions, and risky changes.
        note: Questions must be grouped by blocking, clarifying, and optional severity.
      5:
        requirement: Suggested reviewer comments must be grouped by blocking, clarifying, and non-blocking severity, and every suggested comment must cite evidence.
        note: Suggested comments are local drafts by default and must not be auto-posted without explicit user configuration.
      6:
        requirement: The human surface must include concrete test-plan items for missing automatic tests and concrete manual-check procedures for missing manual checks.
      7:
        requirement: The human surface must identify skim-safe files or areas only when no high-risk finding maps to them.
      8:
        requirement: Agent handoff must be rendered as a secondary surface and must not be the default reviewer entrypoint.
      9:
        requirement: The human review model must be emitted as schema-validated JSON and rendered to Markdown from that JSON.
      10:
        requirement: Reviewer feedback files must be able to tune false positives, team policies, required manual checks, and preferred review focus without overriding evidence silently.
      11:
        requirement: When a previous packet comparison is available, the human surface must render reviewer-focused since-last-review deltas.
        note: Improved, regressed, new, resolved, and still-open items must be visible without forcing reviewers to inspect raw count deltas.
      12:
        requirement: The human surface must generate review routes for the default human reviewer, maintainer, security reviewer, product reviewer, and agent-continuation personas.
        note: Routes must be derived from the same evidence-backed verdict, queue, risks, questions, trust audit, comments, and test-plan items; the human route is default and the agent route is secondary.
      13:
        requirement: The human surface must render compact inline evidence cards that cite evidence, explain why the evidence matters, and give a reviewer action.
        note: Evidence cards must distinguish direct evidence, missing evidence, and invalid evidence so missing or untrusted signals are not rendered as proof.

  PROVIDERS:
    name: Later provider integrations
    description: Integrations that expose local review artifacts in code-hosting or spec-tracking systems.
    requirements:
      1:
        requirement: GitHub comment integration must reuse local artifacts and must not redefine the core packet schema.
      2:
        requirement: GitLab, Gerrit, SARIF, and Acai API sync must be optional provider adapters.
      3:
        requirement: Provider adapters must not be required for local MVP functionality.
      4:
        requirement: Acai CLI/API sync, when added, must preserve local-first operation and work without requiring hosted Acai for tests.
      5:
        requirement: Posted PR-mode comments must require a non-mock LLM narrative whose file, requirement, risk, and status anchors are validated against deterministic PR facts.
      6:
        requirement: The CI PR comment workflow must keep LLM API keys out of PR-controlled workflow YAML, install, build, and executable code by running secret-bearing steps from a base-controlled workflow with a trusted tool checkout against a credentialless PR subject checkout.

constraints:
  EVIDENCE:
    name: Evidence, determinism, and trust
    description: Claims must be grounded and machine-checkable.
    requirements:
      1:
        requirement: Code must control workflow orchestration, schema validation, evidence validation, caching, and exits.
      2:
        requirement: Every substantive generated claim must link to evidence or be marked unknown, assumption, hypothesis, or missing evidence.
      3:
        requirement: LLM-emitted file paths, line ranges, commands, test names, ACIDs, and event IDs must be validated.
      4:
        requirement: Invalid references must become invalid_evidence findings rather than trusted facts.
      5:
        requirement: The tool must work in local/offline mode with mock or disabled LLM modules.
      6:
        requirement: The packet must clearly distinguish verified evidence from agent claims.
      7:
        requirement: PR narrative output must answer what changed, why it matters, and where to look first, and each core section must survive evidence validation before the surface is postable.

  HUMAN_TRUST:
    name: Human reviewer trust
    description: Human surfaces must be action-oriented, bounded, evidence-backed, and conservative when evidence is missing.
    requirements:
      1:
        requirement: Merge-readiness decisions must degrade conservatively when required evidence is missing.
      2:
        requirement: LLM output may improve prose but must not create blockers, clear blockers, set coverage status, or set merge-readiness verdicts.
      3:
        requirement: Every human-review action must cite evidence or be explicitly marked as a question, assumption, or missing-evidence item.
      4:
        requirement: Human-review Markdown must fit on one readable screen for the top summary and link to deeper artifacts for details.
      5:
        requirement: Human surfaces must avoid generic AI review boilerplate.

  PRIVACY:
    name: Security and privacy
    description: Avoid leaking sensitive files, logs, and secrets.
    requirements:
      1:
        requirement: Raw conversation logs must not be copied into public artifacts by default.
      2:
        requirement: Secret scanning or redaction must run before any remote LLM call.
      3:
        requirement: .review-surfacesignore must exclude sensitive files and logs deterministically.
      4:
        requirement: The tool must not infer private context that is absent from files or logs.
      5:
        requirement: PR-mode remote prompts must be secret-scanned, redacted, and blocked on high-risk material before any LLM call.

  QUALITY:
    name: Testing and release quality
    description: Test deterministic logic, schemas, fixtures, LLM boundaries, and dogfood loops.
    requirements:
      1:
        requirement: Unit tests must cover Acai parsing, ACID generation, config loading, evidence validation, and schema validation.
      2:
        requirement: Fixture tests must cover sparse specs, conflicting docs, overreach, missing tests, missing logs, and invalid evidence.
      3:
        requirement: End-to-end tests must run the CLI against fixture repositories using llm.mock.
      4:
        requirement: Golden tests should assert structure and critical findings, not brittle full prose.
      5:
        requirement: Dogfood runs must record limitations when modules are not implemented yet.
      6:
        requirement: CI/PR integration must remain optional until the local pipeline is useful.
      7:
        requirement: The tool should fail gently during early local dogfood runs and hard-fail only for explicit validation commands or configured gates.
      8:
        requirement: Generated review packets must be compact enough for human review.

  SCHEMA:
    name: Machine-readable artifact schemas
    description: Keep review packet contracts aligned with generated local artifacts.
    requirements:
      1:
        requirement: schemas/review_packet.schema.json must validate review_packet.json fields for architecture diagram validation metadata.
      2:
        requirement: schemas/review_packet.schema.json must validate methodology claim evidence metadata and agent handoff validation/deferral metadata.
