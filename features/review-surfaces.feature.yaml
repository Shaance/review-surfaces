feature:
  name: review-surfaces
  product: review-surfaces
  version: 0.1.0-bootstrap
  draft: true
  description: |
    Local-first review packet compiler for agent-generated code changes.
    It extracts intent from specs/docs/logs, evaluates implementation against intent,
    generates architecture review surfaces, audits methodology, computes risks/test gaps,
    and dogfoods itself during its own implementation.
  prerequisites:
    - The repository contains this Acai-compatible spec at features/review-surfaces.feature.yaml.
    - The repository contains AGENTS.md and .agents/skills/review-surfaces/SKILL.md for agent workflow.
    - Hosted Acai sync, CI, and PR/MR comments are later renderers; local artifacts are the MVP surface.

components:
  BOOTSTRAP:
    name: Spec-first repository bootstrap
    description: Initialize the repository so agents can start from stable local requirements instead of hidden chat context.
    requirements:
      1:
        requirement: The repository must contain this Acai-compatible feature spec at features/review-surfaces.feature.yaml.
        note: Implementation agents must preserve component IDs and requirement IDs in review packets, tests, and remediation notes where useful.
      2:
        requirement: The repository must contain AGENTS.md with the local development workflow, source-of-truth rules, dogfood rule, and fallback behavior before the CLI is complete.
      3:
        requirement: The repository must contain .agents/skills/review-surfaces/SKILL.md with skill metadata and a compact workflow for using review-surfaces while implementing review-surfaces.
      4:
        requirement: The bootstrap flow must treat any local coffee-agents setup as optional scaffolding, not as a product dependency.
        note: Public docs, tests, and code must not require private coffee-agents paths or scripts.
      5:
        requirement: The bootstrap command should create or validate AGENTS.md, the review-surfaces skill, config, schemas, and this feature spec.
        note: Missing bootstrap files should be created deterministically and be easy to review.
      6:
        requirement: The repository must contain .agents/skills/review-surfaces-usage/SKILL.md with a reusable workflow for running review-surfaces in any local repository.
        note: The skill must keep hosted comments, dashboards, and CI as later renderers over local .review-surfaces artifacts.

  CLI:
    name: Local-first CLI
    description: Commands needed before CI or PR/MR comment renderers exist.
    requirements:
      1:
        requirement: The CLI must expose init, bootstrap, collect, intent, evaluate, diagrams, methodology, risks, dogfood, handoff, packet, all, validate, and later comment commands.
        note: Commands may be stubs early, but help output and stable command names should exist.
      2:
        requirement: review-surfaces all must run the whole available local pipeline and write artifacts under .review-surfaces by default.
      3:
        requirement: Commands must avoid modifying repository files except for init/bootstrap or explicitly configured writes.
      4:
        requirement: Every command must support predictable exit codes for success, usage error, schema validation failure, evidence validation failure, privacy block, and optional quality gate failure.
      5:
        requirement: The CLI must support mock/offline operation so tests and dogfood runs do not require network access or a hosted LLM.
      6:
        requirement: The CLI must support dogfood mode with milestone, previous packet path, and feedback ingestion options.
      7:
        requirement: The CLI should provide a run helper that executes a local command and records a bounded command transcript artifact.
        note: The helper must keep local/offline operation, redact secrets, and avoid storing unbounded raw stdout or stderr.
      8:
        requirement: validate must support validating human_review.json and pr_review_surface.json in addition to review_packet.json, for example via a --surface packet|human|pr|all option.
      9:
        requirement: The CLI must reject unknown commands and unknown or misspelled flags with a usage error (the usage exit code) that suggests the nearest valid name, rather than silently ignoring them; a per-command known-flag allow-list derived from the flags each command reads backs the flag check.
        note: "ci-trust uplift Phase 4 (docs/history/CI_TRUST_UPLIFT_GOAL.md). Dogfood: `all --proivder mock` ran silently with the default provider and unknown commands gave no suggestion. Extends CLI.4's predictable-exit-code contract."
      10:
        requirement: CLI help and informational output must stay honest and complete — `--help` documents every command in the dispatch table and every flag the CLI reads (asserted by a test iterating the command and flag sets, including --budget, --verbose, --check and all comment --format values), and artifact path lines print a clean clickable path (absolute when the --out target resolves outside the working directory) instead of long parent-escape (../../) sequences.
        note: "ci-trust uplift Phase 4. Dogfood: --help omitted eight real flags and under-documented comment --format; an outside-cwd --out printed ../../../../../tmp/... paths."

  COLLECTOR:
    name: Input collection and indexing
    description: Deterministic collection of repository, spec, docs, tests, agent instruction, feedback, and conversation inputs.
    requirements:
      1:
        requirement: The collector must resolve base/head refs and write diff, changed files, commits, and manifest data.
      2:
        requirement: The collector must discover and index features/**/*.feature.yaml files.
        note: Acai IDs such as review-surfaces.INTENT.2 must be preserved in specs.index.json or acai.index.json.
      3:
        requirement: The collector must index README, docs, plans, AGENTS.md, and local skill files as source inputs.
      4:
        requirement: The collector must normalize supported conversation/tool logs into conversation.normalized.jsonl when supplied.
      5:
        requirement: Missing conversation logs must be recorded as missing evidence rather than causing fatal failure.
      6:
        requirement: The collector must support .review-surfacesignore and privacy exclusions before files are copied or sent to an LLM provider.
      7:
        requirement: The collector must ingest bounded local command transcript artifacts and write .review-surfaces/inputs/commands.json.
        note: Transcripted successful test commands may be treated as direct evidence; feedback-recorded commands remain claimed or indirect unless backed by a transcript.

  INTENT:
    name: Intent extraction
    description: Convert specs, docs, plans, tickets, and logs into a source-backed task intent.
    requirements:
      1:
        requirement: The intent builder must generate intent.yaml with summary, requirements, constraints, non-goals, assumptions, and open questions.
      2:
        requirement: Every generated requirement must cite at least one source or be explicitly marked as an assumption or open question.
      3:
        requirement: Acai requirement IDs must round-trip into intent.yaml.
      4:
        requirement: Contradictory or sparse sources must produce open questions rather than hallucinated goals.
      5:
        requirement: Intent extraction must be schema-bound and provider-agnostic.
        note: llm.mock should support deterministic tests.
      6:
        requirement: The intent builder should support provider-assisted intent synthesis through the existing provider boundary (mock, agent-file, ai-sdk), taking indexed spec and doc excerpts and proposing schema-bound candidate requirements (statement, anchors, confidence) whose anchors are restricted to the same allowlist mechanism as the narrative (spec sections, doc files, ACIDs).
        note: Next-value Phase 6 (brainstorm idea 12, deferred FB-2026-05-28-007). Deterministic extraction remains the spine and the fallback; the agent-file provider gets the same contract so a coding agent can contribute hypotheses offline.
      7:
        requirement: A provider-proposed candidate requirement whose anchors resolve under deterministic validation must be rendered distinctly in a separate claimed-candidate section of intent.yaml and in intent_mismatch.md, kept out of the evaluated requirements list so the evaluator never produces a coverage result for it, while a candidate with invalid anchors must be demoted to an open question rather than dropped silently; provider candidates must never change requirement coverage status or the merge-readiness verdict.
        note: Next-value Phase 6 (brainstorm idea 12). The separate claimed-candidate section is what keeps the never-affect-coverage promise enforceable — evaluated requirements (EVAL.1 produces one coverage result per intent requirement) must not include provider candidates. This restates the human-trust boundary for intent synthesis — provider output widens what the human is asked to confirm but never becomes proof.

  EVAL:
    name: Implementation evaluation
    description: Evaluate the diff against extracted intent and show requirement coverage.
    requirements:
      1:
        requirement: The evaluator must produce one requirement result per intent requirement.
      2:
        requirement: Requirement statuses must include satisfied, partial, missing, unknown, overreach, and invalid_evidence.
      3:
        requirement: The evaluator must map requirements to source, docs, tests, commands, diffs, logs, and spec evidence when available.
      4:
        requirement: The evaluator must detect underreach where a requirement lacks implementation or test evidence.
      5:
        requirement: The evaluator must detect overreach where changed files do not map to stated intent.
      6:
        requirement: The evaluator must produce Acai coverage metadata for Acai-backed requirements.

  ARCH:
    name: Architecture and diagrams
    description: Decompose changed work into high-level, subsystem, and interaction review surfaces.
    requirements:
      1:
        requirement: The tool must generate architecture.md with a high-level overview, changed subsystem map, per-subsystem cards, and diagrams.
      2:
        requirement: The first diagram format must be Mermaid, written under .review-surfaces/diagrams.
      3:
        requirement: Diagrams must be evidence-backed and review-sized, not visual-only guesses.
      4:
        requirement: Subsystem cards must include purpose, files, responsibilities, interactions, tests, risks, and relevant docs/specs.
      5:
        requirement: "Diagram generation should be hybrid: deterministic file/dependency grouping first, LLM labeling second."
      6:
        requirement: The diagram generator must validate generated Mermaid artifacts and report invalid or noisy diagrams in local architecture outputs.

  METHODOLOGY:
    name: Agent workflow audit
    description: Analyze raw conversation/tool logs to judge whether the workflow made sense.
    requirements:
      1:
        requirement: methodology.yaml must summarize considered options, research, decisions, unchallenged assumptions, skipped work, and quality flags.
      2:
        requirement: The auditor must separate agent claims from verified evidence.
      3:
        requirement: Claimed tests without command or test-output evidence must be flagged.
      4:
        requirement: Missing logs must produce a useful finding rather than a fatal error.
      5:
        requirement: Methodology findings must feed into risk analysis and review focus.

  RISK:
    name: Risk and test-gap analysis
    description: Compute review risk, tested areas, untested areas, and manual/automatic checks.
    requirements:
      1:
        requirement: risks.yaml must include a risk register, test evidence, test gaps, suggested checks, and review focus.
      2:
        requirement: The analyzer must distinguish direct test evidence, indirect test evidence, claimed evidence, and missing evidence.
      3:
        requirement: Risk scoring must preserve severity, likelihood, and detectability labels.
      4:
        requirement: Missing manual checks and missing automatic tests must be listed separately.
      5:
        requirement: Risk findings must cite evidence or be marked as hypotheses.

  DOGFOOD:
    name: Self-dogfooding loop
    description: Use review-surfaces to build and improve review-surfaces.
    requirements:
      1:
        requirement: Every milestone must run the strongest available subset of the tool against this repository.
        note: If a self-run cannot be produced yet, the reason must be recorded explicitly.
      2:
        requirement: dogfood.yaml must capture whether generated outputs helped the implementation agent and the human reviewer.
      3:
        requirement: Dogfood findings must be classified separately from implementation defects.
        note: Categories include usability, review_value, evidence_quality, agent_workflow, schema, diagram_quality, test_gap, and performance.
      4:
        requirement: Dogfood findings should propose remediation tasks or Acai spec updates when appropriate.
      5:
        requirement: agent_handoff.md must be generated from packet data for the next implementation agent.
      6:
        requirement: A human feedback file must be ingestible without requiring a hosted service.
        note: .review-surfaces/feedback/*.yaml should be read by review-surfaces dogfood.
      7:
        requirement: The product must include a dogfood-loop architecture diagram by milestone M4.
      8:
        requirement: The repository must contain .agents/skills/review-surfaces-dogfood-loop/SKILL.md with a self-improvement workflow for turning packet findings into code, tests, specs, docs, skills, feedback files, or explicit deferrals.
      9:
        requirement: The repository must contain .agents/skills/composed-review-loop/SKILL.md with a composed review workflow for combining packet evidence, command transcripts, dogfood findings, PR feedback, and a full-diff review into one readiness decision.
        note: Optional external review skills may be used when available, but the repo-local workflow must include generic fallbacks and must not depend on private local skill setup.

  RENDER:
    name: Packet rendering and machine-readable outputs
    description: Render structured outputs into human- and agent-readable review surfaces.
    requirements:
      1:
        requirement: review_packet.md must include summary, intent, requirement coverage, risks, diagrams, methodology, test gaps, dogfood findings, open questions, and an evidence appendix when available.
      2:
        requirement: review_packet.json must unify structured outputs for scripts and agents.
      3:
        requirement: review_packet.json must validate against schemas/review_packet.schema.json.
      4:
        requirement: Generated Markdown must support compact and full modes so human reviewers are not overwhelmed.
      5:
        requirement: Repo-mode PR/MR comments must remain a renderer over review_packet.json, while PR-mode comments must render from a separate PR-scoped sidecar artifact.
      6:
        requirement: PR-mode comments must avoid whole-spec coverage dumps, generic review-focus boilerplate, and static whole-repo diagrams.
      7:
        requirement: The CLI must support comment --mode pr|repo|auto and all --surface-mode pr|repo|auto.
      8:
        requirement: Local PR-comment rendering without --post must exit successfully after writing the local comment and diagnostics; postability failures must produce non-zero exits only when posting is requested or a strict postability flag is set.
      9:
        requirement: The human surface must support a human --format html mode that emits a single self-contained HTML file (inline CSS and a small amount of vanilla JS, no server, no CDN, and no framework) rendered strictly from the HumanReviewModel and nothing else.
        note: Next-value Phase 5 (brainstorm idea 7). A strict sibling of the markdown renderer — if the HTML needs data the model lacks, the model and strict schema grow first so the JSON, Markdown, and HTML surfaces can never diverge.
      10:
        requirement: The HTML cockpit must escape every interpolated value through one shared helper, re-run the redaction pass on render, and produce byte-deterministic output (no timestamps), laying out a verdict and narrative header, the review queue as the spine (each item with its excerpt, evidence, ranking reason, and links between queue, evidence, and narrative claims), and lens filters, with collapsible hunks and localStorage-persisted checkable queue items.
        note: Next-value Phase 5 (brainstorm idea 7). The file must open from disk offline, be safe to attach in chat, and stay printable.
      11:
        requirement: The HTML cockpit must render the change_graph model as deterministic inline SVG via a dedicated src/human/render-svg-map.ts module — a hand-rolled layered layout (column per cluster ordered by the reading-order leg order, stable row sort within a column, fixed viewBox, system font stack) with no chart or diagram library and no inlined mermaid.js — where every coordinate derives from sorted input so identical models produce byte-identical SVG, every interpolated label passes through the shared redact-then-escape helper, node click filters the queue to that file via the existing data-attribute filter pattern, and hover details are carried by SVG title elements so the map degrades gracefully in print.
        note: Visual uplift M10 (brainstorm idea 3). Pure renderer over the CHANGE_MAP.1 model — if the SVG needs data the model lacks, the model and strict schema grow first. The esc() helper is module-private in render-html.ts today and must be exported or lifted to a shared module.
      12:
        requirement: The HTML cockpit must open with an at-a-glance header strip rendered purely from existing model fields — lens chips with counts that are the existing lens-filter toggle buttons, the review_plan read/skim/defer cut as a stacked CSS bar with estimated minutes, trust-audit counts, and a review-progress bar recomputed from the existing persisted checkbox state — with no charts library or canvas, and every chip and bar carrying a text label so color never carries meaning alone and the strip stays printable.
        note: Visual uplift M10 (brainstorm idea 6). Zero new data; pure render work over verdict, queue lens tags, review_plan, and trust-audit fields the model already carries.
      13:
        requirement: When dependency facts include attributed transitive additions, supply-chain lens surfaces must render the chain as an indented tree (direct dependency to the new transitives it pulled, install-script flags marked), using a mermaid rendering on GitHub comment surfaces where a chain exists, and must fall back to the honest flat grouping (direct-dependency section plus unattributed new-transitives list) whenever lockfile dependency edges could not be resolved.
        note: Visual uplift P2 tail (brainstorm idea 8). The render is a grouping pass over DEP_FACTS.4 attribution data; registry metadata stays deferred behind the provider boundary.

  HUMAN_REVIEW:
    name: Human reviewer cockpit
    description: Convert packet evidence into an ordered review decision surface for human reviewers.
    requirements:
      1:
        requirement: The default human surface must start with a merge-readiness verdict, top blockers, and an ordered review queue.
        note: The verdict must be deterministic and derived from evidence, risks, coverage, tests, privacy state, and configured policy, not from untrusted LLM prose.
      2:
        requirement: Review queue items must cite changed files and, when available, diff hunks or line ranges.
        note: Queue items without path or hunk evidence must be rendered as general questions, not as main review-first items.
      3:
        requirement: The human surface must separate verified facts, author or agent claims, missing evidence, and invalid evidence.
        note: Claimed tests without command transcript or parsed test-output evidence must be visible near the top of the surface.
      4:
        requirement: The human surface must generate reviewer questions for ambiguous intent, missing evidence, coverage regressions, and risky changes.
        note: Questions must be grouped by blocking, clarifying, and optional severity.
      5:
        requirement: Suggested reviewer comments must be grouped by blocking, clarifying, and non-blocking severity, and every suggested comment must cite evidence.
        note: Suggested comments are local drafts by default and must not be auto-posted without explicit user configuration.
      6:
        requirement: The human surface must include concrete test-plan items for missing automatic tests and concrete manual-check procedures for missing manual checks.
      7:
        requirement: The human surface must identify skim-safe files or areas only when no high-risk finding maps to them.
      8:
        requirement: Agent handoff must be rendered as a secondary surface and must not be the default reviewer entrypoint.
      9:
        requirement: The human review model must be emitted as schema-validated JSON and rendered to Markdown from that JSON.
      10:
        requirement: Reviewer feedback files must be able to tune false positives, team policies, required manual checks, and preferred review focus without overriding evidence silently.
      11:
        requirement: When a previous packet comparison is available, the human surface must render reviewer-focused since-last-review deltas.
        note: Improved, regressed, new, resolved, and still-open items must be visible without forcing reviewers to inspect raw count deltas.
      12:
        requirement: The human surface must generate review routes for the default human reviewer, maintainer, security reviewer, product reviewer, and agent-continuation personas.
        note: Routes must be derived from the same evidence-backed verdict, queue, risks, questions, trust audit, comments, and test-plan items; the human route is default and the agent route is secondary.
      13:
        requirement: The human surface must render compact inline evidence cards that cite evidence, explain why the evidence matters, and give a reviewer action.
        note: Evidence cards must distinguish direct evidence, missing evidence, and invalid evidence so missing or untrusted signals are not rendered as proof.
      14:
        requirement: PR-mode comments should render from the human review model when a current schema-valid human_review.json is available, while preserving pr_review_surface.json as the lower-level PR fact and postability model.
        note: If the human model is missing or stale, the renderer may fall back to the PR sidecar; posting must still obey the validated remote-narrative gate.
      15:
        requirement: The all command terminal summary must make the human review surface the default entrypoint and report verdict, review-first count, blocker count, suggested-comment count, and missing-evidence count.
        note: Agent handoff remains a secondary artifact and must not be promoted above the human review surface in the default terminal summary.
      16:
        requirement: Human review configuration must support bounded reviewer-facing caps and deterministic risk-lens toggles without changing the default local-first behavior.
        note: Invalid or absent config values must fall back to safe defaults, and disabled risk lenses must remove lens-derived actions rather than hiding underlying deterministic evidence.
      17:
        requirement: Human review configuration must support required manual checks triggered by changed-path patterns.
        note: Missing configured manual checks must appear as deterministic blockers, reviewer questions, and required manual test-plan items until current-head evidence records the check.
      18:
        requirement: The human surface must render explicit intent-mismatch findings that distinguish expected spec intent, observed diff behavior, possible mismatches, possible overreach, and missing intent mappings.
        note: Intent-mismatch findings must cite packet or PR-scope evidence, must not fabricate intent absent from local specs/docs/tickets, and ambiguous intent must produce reviewer questions.
      19:
        requirement: Rendered human review surfaces must aggregate near-identical templated findings into single rollup items instead of repeating the same sentence per requirement ID.
        note: Test-plan items, reviewer questions, and evidence cards that differ only by ACID must render as one rollup listing the affected ACIDs, with per-item detail preserved in the JSON model and standalone artifacts.
      20:
        requirement: Review-first queue items with hunk or line anchors should render a bounded inline diff excerpt so reviewers can act without opening another tool.
        note: Excerpts must be bounded (around 10-15 lines), sourced from collected diff inputs, and must respect privacy exclusions and redaction rules.
      21:
        requirement: Reviewer-facing prose must lead with the changed file, the observable behavior, and the concrete reviewer action; internal identifiers such as ACIDs, risk IDs, and card IDs must appear as trailing metadata rather than as the subject of the sentence.
        note: Self-referential bookkeeping phrasing (for example "ranked from whole-packet medium testing risk RISK-001") must be replaced by the underlying reason the item matters.
      22:
        requirement: Rollup rendering must lead with the distinguishing detail, not a shared generic summary — test-plan items that differ only by suggested file must either merge into one heading listing the files or lead each heading with its distinguishing field, so the rendered Test plan never repeats visually identical headings (extends HUMAN_REVIEW.19/.21).
        note: "ci-trust uplift Phase 5 (docs/history/CI_TRUST_UPLIFT_GOAL.md). A live run rendered five identical '### API / schema contract lens fired ...' headings because the rollup led with the generic gap rather than the suggested_file."
      23:
        requirement: "Generated reviewer-facing prose must be punctuation- and label-clean — a templated question or sentence embedding a summary that already ends in sentence punctuation must not produce doubled terminal punctuation (for example \".?\"), and the empty linked-risk-id case must not render a label that reads as a risk-severity claim (\"Risk: none\") next to a high-severity ranking line."
        note: "ci-trust uplift Phase 5. Live runs showed '.?' in reviewer questions and 'Risk: none' rendered directly under 'ranked by high risk severity'."

  NARRATIVE:
    name: Grounded change narrative
    description: Optional provider-written prose that explains what the change does, with every claim anchored to evidence and trust-marked by deterministic validation.
    requirements:
      1:
        requirement: The human surface should open with a bounded plain-language narrative covering what the change does, why it matters, and where risk concentrates, produced through the existing provider boundary (mock, agent-file, ai-sdk).
        note: The narrative reuses the PR-narrative anchor discipline; it is prose over deterministic facts, never a new fact source.
      2:
        requirement: Every narrative claim must cite allowlisted anchors (changed files, hunks, ACIDs, command transcripts, schema artifacts) and pass deterministic anchor validation.
        note: Claims with missing or invalid anchors must be demoted to visibly marked unverified claims rather than dropped silently or rendered as fact.
      3:
        requirement: The rendered narrative must mark the trust state of each claim (verified or claimed) so reviewers can see at a glance which sentences are evidence-backed.
      4:
        requirement: Narrative output must not create or clear blockers, change coverage status, or alter the merge-readiness verdict.
        note: This restates review-surfaces.HUMAN_TRUST.2 for the narrative surface specifically.
      5:
        requirement: When no narrative provider output is available or validation rejects it, the human surface must render the deterministic fallback summary without failing.

  SEMANTIC_DIFF:
    name: Semantic change facts
    description: Deterministic facts computed from the meaning of the diff rather than from path or filename matching.
    requirements:
      1:
        requirement: When JSON schema files change, the tool must compute a semantic schema diff (properties added or removed, required-list changes, type or enum changes) and attach the specifics to schema-contract risks, queue items, and suggested comments.
        note: A schema-contract finding should say what changed in the contract (for example a field became required), not merely that a schema file was touched.
      2:
        requirement: The tool should compute an exported API surface diff for changed TypeScript sources (exported symbols added, removed, or signature-changed) and attach it to contract-related risks and queue items.
      3:
        requirement: The tool must detect test-weakening signals (deleted test files, newly skipped tests, removed assertions, regenerated snapshots) as a distinct deterministic risk class surfaced near the top of the human surface.
      4:
        requirement: Semantic change facts must flow into review queue ranking, risk lenses, and suggested comments using concrete language instead of generic path-based phrasing.

  REVIEW_LOOP:
    name: Interactive review session
    description: A guided terminal loop that walks the reviewer through the ranked queue and feeds decisions back into feedback memory.
    requirements:
      1:
        requirement: The CLI should provide a review walkthrough command that steps through the ranked review queue item by item, showing the inline hunk excerpt, the reason, and the evidence for each item.
      2:
        requirement: Reviewer decisions captured in the session (accept, flag, false positive, needs comment) must persist into local feedback files so later runs downgrade or promote matching findings.
        note: This is the primary ergonomic feeder for the existing feedback-memory requirements; decisions must never silently delete evidence.
      3:
        requirement: Comment drafts captured during the session must be written into the suggested-comments artifact and marked as draft or ready to post.
      4:
        requirement: In non-interactive environments the walkthrough command must degrade gracefully by printing the next queue item and exiting cleanly.

  PROVIDERS:
    name: Later provider integrations
    description: Integrations that expose local review artifacts in code-hosting or spec-tracking systems.
    requirements:
      1:
        requirement: GitHub comment integration must reuse local artifacts and must not redefine the core packet schema.
      2:
        requirement: GitLab, Gerrit, SARIF, and Acai API sync must be optional provider adapters.
      3:
        requirement: Provider adapters must not be required for local MVP functionality.
      4:
        requirement: Acai CLI/API sync, when added, must preserve local-first operation and work without requiring hosted Acai for tests.
      5:
        requirement: Posted PR-mode comments must require a non-mock LLM narrative whose file, requirement, risk, and status anchors are validated against deterministic PR facts.
      6:
        requirement: The CI PR comment workflow must keep LLM API keys out of PR-controlled workflow YAML, install, build, and executable code by running secret-bearing steps from a base-controlled workflow with a trusted tool checkout against a credentialless PR subject checkout.
      7:
        requirement: GitHub integration should support exporting hunk-anchored suggested comments as a pending draft review for the human to edit and submit, and must never auto-submit reviews or comments without explicit opt-in.

  PR_SURFACE:
    name: GitHub PR review surface
    description: >-
      Next-value Phase 1 / milestone M6 (brainstorm ideas 1 and 2). A reusable
      GitHub Action that runs the local pipeline on a PR, posts one idempotent
      sticky comment rendered from human_review.json, uploads the artifact
      directory, and leads with the since-last-review delta on re-pushes. The
      Action is a renderer over local artifacts, never a separate analysis path.
    requirements:
      1:
        requirement: The repository must publish a reusable composite GitHub Action that runs review-surfaces all --review-scope pr on a pull request, defaulting to --provider mock so a consuming repository gets full value with zero secrets, with inputs for provider, base/head refs, output directory, and comment top-N.
        note: Generalize the existing base-controlled pr-review-comment workflow (PROVIDERS.6); the repo-local workflow must become a thin consumer of the action so CI and local artifacts share one implementation and cannot disagree.
      2:
        requirement: The Action must post or update exactly one sticky PR comment rendered from human_review.json via a compact sticky-summary renderer (verdict, top-N review-queue items with their existing hunk excerpts, trust-audit counts, and a link to the uploaded artifact), using marker-based idempotent upsert so re-runs edit the same comment.
        note: Reuse the human-review rollup logic so the comment stays short; the sticky renders from the human review model, not the lower-level PR sidecar.
      3:
        requirement: The Action must upload the full .review-surfaces/ directory as a workflow artifact under a stable name keyed by PR number; for fork pull requests it must still generate and upload the artifact but skip posting, never exposing the write token to PR-controlled code.
      4:
        requirement: The strict postability gate and secret redaction must run before any rendered text leaves the runner, and the Action must post only the sticky summary comment; suggested review comments remain local drafts and must never be auto-posted.
        note: The sticky summary is the deterministic human-review rollup, not provider-written narrative prose, so it is exempt from the PROVIDERS.5 non-mock-narrative posting gate and may be posted under --provider mock; PROVIDERS.5 continues to govern any LLM narrative comment. The redaction and postability gates apply to the sticky regardless of provider.
      5:
        requirement: On a subsequent push the Action must recover the previous review packet (most recent prior PR-keyed artifact, with an in-comment fingerprint as a fallback pointer) and lead the sticky comment with the since-last-review delta (improved, regressed, new, resolved) computed against the last posted sticky, collapsing the unchanged remainder.
        note: Item identity across runs must use stable finding keys (rule id plus file path plus anchor), not array positions; a missing or expired prior artifact must be treated as the first-review case, never an error.

  RANKING:
    name: Queue ranking v2
    description: >-
      Next-value Phase 2 / milestone M7 (brainstorm idea 3, recorded as
      FB-2026-06-09-001). A deterministic evidence-based scoring pass that
      connects changed tests, current-head transcripts, and coverage facts to
      changed implementation paths, and makes every queue item explain why it
      ranked where it did.
    requirements:
      1:
        requirement: The tool must compute a per-changed-implementation-path evidence score from deterministic signals — whether focused tests changed alongside it (mapping test files to impl paths via parsed import statements, falling back to path/basename heuristics), whether a passing current-head command transcript covers those tests, and coverage facts when present — applied as a modifier on the existing rank rather than a replacement.
        note: Semantic-risk class remains the primary ranking key; evidence breaks ties and demotes well-evidenced items. Higher evidence lowers urgency and vice versa.
      2:
        requirement: Every review-queue item must carry a required ranking_reasons field in the human review contract and strict schema, rendered as one plain-language "why ranked here" line per item (for example "no test changes touch this file; no transcript exercises it").
      3:
        requirement: Ranking must be fully deterministic — identical inputs must produce byte-identical ordering with a stable tie-break on file path — and the evidence score must never hide an item entirely; a well-evidenced item moves down the queue, it never disappears.
        note: pnpm run determinism-check must stay green; ranking weights must not be tuned beyond the obvious before the effectiveness eval harness exists.

  COVERAGE:
    name: Coverage-delta evidence
    description: >-
      Next-value Phase 2 / milestone M7 (brainstorm idea 6). Deterministic,
      offline ingestion of a coverage report to compute, per changed hunk,
      whether the changed lines are executed by any test — feeding evidence
      cards and the ranking evidence score.
    requirements:
      1:
        requirement: The tool must parse an lcov coverage report (its SF and DA records) into an internal coverage model, sourced from an explicit --coverage <path> flag or auto-detected coverage/lcov.info, mirroring the existing external-test-result evidence ingestion shape.
        note: Other coverage formats may come later behind the same internal model; an unsupported or unparseable report must degrade to "no coverage evidence", never a guess.
      2:
        requirement: Coverage report provenance (path, content hash, and whether the report postdates the head commit) must be recorded in the manifest, and a stale report must be marked stale rather than trusted, using the existing artifact-provenance pattern.
      3:
        requirement: The tool must intersect coverage with the changed lines of each hunk to classify it covered, uncovered, or partial, emit per-hunk coverage evidence cards, and feed the per-path evidence score in the ranking pass.
      4:
        requirement: The absence of a coverage report must render as "no coverage evidence", which is distinct from "changed lines uncovered"; a repository must never be penalized for not providing coverage, and coverage is used only when a report exists.
      5:
        requirement: Per-hunk coverage evidence must expose the specific uncovered line numbers — CoverageEvidenceHunk grows a sorted uncovered_lines list, capped with an explicit truncated flag for pathological hunks — with the strict schema growing first.
        note: Visual uplift M10 (brainstorm idea 4). The lcov ingestion already holds per-file line sets internally; only the model exposure is new.
      6:
        requirement: The HTML cockpit must render a per-line coverage gutter on hunk excerpts (glyph plus background tint per line, keyed by line number from the existing hunk fields, print-safe with color never carrying meaning alone), markdown surfaces must render one summary line per excerpt with the uncovered ranges instead of per-line markup, deleted lines must never receive coverage gutters, and the honest-negative rules carry over verbatim — no report renders as "no coverage evidence" (never as red) and a stale report renders with its staleness note.
        note: Visual uplift M10 (brainstorm idea 4). Gutter only the added/context lines on the new side, or the display implies tested-ness for code that no longer exists.

  BUDGET:
    name: Time-budgeted review mode
    description: >-
      Next-value Phase 2 / milestone M7 (brainstorm idea 8). A deterministic
      post-ranking annotation pass that turns the implicit top-of-queue cut into
      an explicit read/skim/defer review plan under a stated time budget.
    requirements:
      1:
        requirement: The human surface must accept a --budget <duration> input (parsing forms such as 15m and 1h; config default off) and estimate a per-item review cost from a deterministic, deliberately crude model (a base cost per item plus changed-hunk lines times a per-line factor, weighted by risk class), rounded to whole minutes and documented as an estimate rather than a promise.
      2:
        requirement: The tool must greedily fill items by rank order into read until roughly 70 percent of the budget is consumed, then skim to 100 percent, with the remainder deferred and each deferral carrying its reason from the evidence score, surfaced as a review_plan section on the human review model and strict schema.
        note: Items carrying a blocker are budget-exempt and must never be deferred; the render must state that blockers are exempt.

  EVAL_HARNESS:
    name: Effectiveness eval harness
    description: >-
      Next-value Phase 3 (brainstorm idea 11), pulled ahead of further fact
      expansion. A fixture suite of seeded regressions that measures whether the
      review queue ranks each seeded issue in the top N, run in CI as a
      regression gate on review quality itself. Named distinctly from the
      implementation-evaluation component (EVAL) to avoid repurposing its IDs.
    requirements:
      1:
        requirement: The test suite must include a programmatic fixture builder that creates a temporary git repository, writes a small base project and commits it, applies a seeded mutation and commits it, then runs the real pipeline with --provider mock against base..head and asserts on the resulting human_review.json.
        note: Fixtures must be built programmatically (about thirty lines of builder calls each, readable in the test file) rather than committed as static fixture repositories.
      2:
        requirement: The Phase 3 suite must seed one case per fact class already shipped by the time the eval harness lands (weakened test, breaking API change via the exported-surface diff, schema-contract change, secret in the diff, and uncovered changed lines with a synthetic lcov report) plus negative fixtures (benign rename-only or format-only changes that must not rank in the top N), so removing the eval-harness ACIDs from the allowlist never depends on a not-yet-built detector.
        note: As each later fact class ships, this suite gains one seeded case for it in the same phase that ships the detector — sneaky new dependency with an install script (Phase 4 DEP_FACTS), call-site blast radius for the API change (Phase 4 BLAST_RADIUS), and destructive migration plus CI permission broadening (Phase 4 CONFIG_FACTS) — so the gate ends up covering every shipped fact class without front-loading Phase 4 work into Phase 3.
      3:
        requirement: Each assertion must take the shape "the finding with key K appears in the top N (N generous, around ten) of the queue" for seeded cases and "no finding above severity S" for benign cases, and the suite must run inside pnpm run test so CI gates review quality automatically.
      4:
        requirement: The harness must emit a compact eval_scoreboard.json recording cases passed over total per fact class, and no ranking tuning beyond Phase 2 may land without this gate in place.
      5:
        requirement: The eval harness must include a seeded architecture-drift fixture — a benign change plus a new cross-module import — asserted to rank in the top N of the queue, landing in the same phase that ships the drift detector.
        note: Visual uplift M11 (brainstorm idea 5), following the established one-seeded-case-per-fact-class discipline.
      6:
        requirement: The eval scoreboard must be surfaced twice — a generated, marker-delimited README block (idempotently regenerated from eval_scoreboard.json like the sticky comment's marker upsert, never hand-edited inside the markers) citing cases passed over total per fact class, and one HTML cockpit footer line citing the score — with the local gate asserting the README block is current.
        note: "Visual uplift P2 tail (brainstorm idea 9). The adoption argument: a fact class that loses its seed shows up in the README diff."

  DEP_FACTS:
    name: Dependency and supply-chain facts
    description: >-
      Next-value Phase 4 / milestone M8 (brainstorm idea 4). Deterministic,
      offline semantic facts for manifest and lockfile changes, surfaced through
      a dedicated supply-chain risk lens. Registry metadata is optional provider
      enrichment only.
    requirements:
      1:
        requirement: A deterministic offline detector must diff package.json (dependencies added, removed, or moved between dependency groups; semver-major bumps; version ranges loosened such as a pinned version becoming a caret range) and the lockfile (transitive additions and install-script/requiresBuild flags), parsing pnpm-lock.yaml first and then package-lock.json.
        note: Model the detector on the existing semantic-diff detector, reading base/head file contents at the resolved refs; an unsupported lockfile must yield "no lockfile facts" rather than a guess.
      2:
        requirement: Dependency facts must emit into the existing risk plumbing under a new supply_chain lens id, which requires extending the fixed lens enum across the human-review contract, the strict schema, risk metadata, and the risk_lenses config so a human_review.json carrying the new lens still passes strict validation; once extended, rendering in the risk lenses, queue, and suggested comments follows the existing path, with deterministic severity (a new dependency with install scripts outranks a plain new dependency, which outranks a major bump, which outranks a range loosening) and fact language naming the package and the concrete change.
      3:
        requirement: Registry metadata such as package age and weekly downloads must be deferred behind the existing provider boundary as optional enrichment that adorns deterministic facts; it must never create or remove a fact and the verdict must never depend on it.
      4:
        requirement: The dependency-fact detector must attribute each newly added transitive dependency to the direct dependency that pulled it by parsing the lockfile's dependency edges, recording the attribution as a deterministic fact field, and a lockfile whose edges cannot be resolved must yield unattributed transitive facts (the existing flat output), never a guessed attribution.
        note: Visual uplift P2 tail (brainstorm idea 8). Today's transitive_added facts are flat and unattributed; RENDER.13 renders the attributed chain as a tree.
      5:
        requirement: The dependency-fact detector must emit a deterministic fact for a major-version change in either direction, so a major-version downgrade (a likely-breaking supply-chain change) is surfaced, not only an upward bump.
        note: "ci-trust uplift Phase 3 (docs/history/CI_TRUST_UPLIFT_GOAL.md). dependency-facts only fired major_version_bump when headMajor > baseMajor; a ^3 -> ^2 downgrade produced no fact. A variant of the existing sneaky_dependency fact class, not a new eval-harness class."

  BLAST_RADIUS:
    name: Blast-radius facts
    description: >-
      Next-value Phase 4 / milestone M8 (brainstorm idea 5). Extend the existing
      TypeScript surface parsing with in-repo reference resolution so each
      changed or removed export carries how many files depend on it. Stays at
      module-graph altitude; does not invoke the type checker.
    requirements:
      1:
        requirement: The tool must build a one-pass in-repo import graph over indexed source files, parsing each with ts.createSourceFile and recording import and re-export specifiers resolved to repo-relative module paths via simple suffix rules (./x resolving to x.ts or x/index.ts), extracted into a shared import-graph module that both this and the ranking test-import mapping consume.
        note: Path-alias resolution may be skipped in v1 as a documented bound; parsed files must be cached within the run so the graph is built once.
      2:
        requirement: For each changed or removed export from the existing surface diff, the tool must compute its blast radius as the set of files that import that module and reference the symbol, attaching used_by metadata (a count and the top three to five paths, alphabetical for determinism) to the queue item and contract risks, and feeding it into ranking so a removed export with many importers outranks one with none.
      3:
        requirement: The import-graph build must be bounded — parsing only indexed source files, skipping generated directories via the existing ignore rules, and recording a truncation note if the repository exceeds a file cap — so that "used by 0" is never produced from a silently partial graph.

  CONFIG_FACTS:
    name: Config and infrastructure facts
    description: >-
      Next-value Phase 4 / milestone M8 (brainstorm idea 9). A family of small,
      independent, deterministic detectors for environment-variable, CI-workflow,
      Dockerfile, and SQL/migration changes, each routing facts into an existing
      risk lens. Shipped as separable units so a noisy detector can be reverted
      alone.
    requirements:
      1:
        requirement: An environment-variable detector must flag new or removed process.env references in changed code and key changes in .env example files, with fact language such as "introduces env var X (no default)".
      2:
        requirement: A CI-workflow detector must, for changed .github/workflows files, diff the parsed YAML for permissions broadening, new secrets references, new pull_request_target triggers, and unpinned third-party actions, routing findings into the security lens.
      3:
        requirement: A Dockerfile detector (new RUN curl-pipe-shell patterns, base-image changes, dropped USER) and a SQL/migration detector (destructive statements such as DROP TABLE/COLUMN, ALTER ... TYPE, TRUNCATE, and DELETE without WHERE in changed .sql or migration-directory files) must flag changes for human attention, routing into existing lenses.
        note: Regex altitude is acceptable for these detectors; the fact language must say it is flagging for attention, not proving semantics.

  POLICY:
    name: Team-shared review policy
    description: >-
      Next-value Phase 6 (brainstorm idea 10). A committed, schema-validated
      review-surfaces.policy.yaml that lets the team own false-positive tuning
      through PR, composing with the local walkthrough feedback memory rather
      than replacing it.
    requirements:
      1:
        requirement: The tool must support a committed, schema-validated review-surfaces.policy.yaml (with a dedicated schema and loader) defining suppression rules that each require a reason and an absolute expiry date, severity overrides, and required manual checks per path glob, validated via validate --surface so a malformed policy fails loudly.
      2:
        requirement: Policy precedence must be committed policy over local feedback files over defaults; policy suppressions must demote (downgrade and annotate the finding as suppressed by policy with the stated reason) rather than delete, must match on stable finding keys (rule id plus path glob) rather than free text, and an expired suppression must render as its own finding rather than being silently dropped.
        note: The policy composes with, and does not replace, the walkthrough feedback engine, and is the home for the previously deferred decision_policy question.

  LOCAL_LOOP:
    name: Local review loop
    description: >-
      Visual uplift Phase 1 (brainstorm idea 13). Scripted, GitHub-Actions-free
      production and gating of every review surface, for users without CI minutes
      and for this repo's own per-phase dogfood loop. Orchestration only — the
      scripts call the same CLI commands a user types by hand, so local and CI
      surfaces cannot drift.
    requirements:
      1:
        requirement: The repository must provide scripts/local-review.sh, exposed as pnpm run local-review, that builds the tool, runs all --provider mock against a configurable <base>..<head> range (default origin/main..HEAD), renders the sticky-comment preview to a local file via comment --format sticky, renders human --format html, runs validate --surface all, and prints an index of the produced artifacts to open, using the network for git only.
      2:
        requirement: The repository must provide scripts/local-gate.sh, exposed as pnpm run local-gate, that runs the full merge gate as one command — lint, typecheck, the full test suite, determinism-check, and the strict empty-diff self-dogfood (all --base HEAD --head HEAD --strict) — and fails if any step fails.
        note: The strict empty-diff run is the documented red-main footgun when a phase drops allowlist entries; the gate exists so it can never be skipped by accident.
      3:
        requirement: local-review must accept a previous-round input (--previous <dir>, or auto-detection of the last local run's packet) so since-last-review deltas and the rounds ledger work from local prior packets as well as CI artifacts, with the comparison engine indifferent to the transport.
      4:
        requirement: Both scripts must be documented in README.md and AGENTS.md as the way to produce and gate review surfaces without CI, and must contain orchestration only — no flag, behavior, or analysis may exist solely inside a script rather than in the CLI commands it calls.

  CHANGE_MAP:
    name: Change-impact map v2
    description: >-
      Visual uplift Phase 2 / milestone M9 (brainstorm idea 1). A shared,
      schema-validated change-graph model built from the existing import graph and
      blast-radius facts, plus a focused mermaid emitter that replaces the
      requirements-hairball diagram on the human comment surfaces. Every node and
      edge cites a deterministic fact; caps are rendered, never silent.
    requirements:
      1:
        requirement: The human review model and strict schema must grow a change_graph section with nodes (changed files with churn added/removed counts, dominant risk lens, and status added/modified/deleted/renamed), halo_nodes (top unchanged importers taken from blast-radius facts, at most two per high-blast node, alphabetical exactly as the fact's bounded used_by top list stores them), edges (importer to imported restricted to those nodes, each carrying a kind of existing, new, or removed), and clusters (top-level directory grouping, with files under src/ grouped by their directory directly under src/ — the brainstorm's "top-level dir under src/, plus tests/, schemas/, config"), with every list sorted and the graph built from the existing buildImportGraph output restricted to changed files — no new parsing.
        note: Visual uplift M9 (brainstorm idea 1). The edge kind slot ships here as existing-only; ARCH_DRIFT.2 fills new/removed later.
      2:
        requirement: A focused mermaid emitter (src/diagrams/change-map.ts) must render the change_graph as a flowchart LR with one subgraph per cluster and a classDef per lens, enforcing hard caps (around 25 changed-file nodes and around 10 halo nodes) where overflow renders as one explicit "+ N more files" node per cluster, never as silent truncation.
      3:
        requirement: The change map must embed as a collapsed details block in renderHumanPrComment and the sticky summary, and as a new diagram embed in human_review.md; the old provider-narrative-path "Change impact" embed must retire with the requirements hairball, while the spec/requirement-mapping diagram (pr-change-impact.mmd) remains a standalone agent-facing artifact off the human surfaces; the map must carry no spec or requirement anchors.
        note: One diagram answers one question. The map's left-to-right flow must agree with the reading-order tour's numbering — same underlying order.
      4:
        requirement: Every change-map label must pass through the shared diagram-label sanitizer (unifying the private copy in pr-change-diagram.ts rather than adding another), every embed point must keep the body-level fence-close guard, redaction must run before render, and scripts/determinism-check.sh must gain a PR-scope run so the comment-embedded map is determinism-checked.

  READING_ORDER:
    name: Guided diff tour
    description: >-
      Visual uplift Phase 2 / milestone M9 (brainstorm idea 2). A deterministic,
      dependency-ordered reading plan over changed files — comprehension order,
      not risk order — cross-linked with the review queue rather than merged
      into it.
    requirements:
      1:
        requirement: The human review model and strict schema must grow a reading_order section computed by restricting the import graph to changed files and topologically sorting with dependencies first, where strongly connected components collapse into one read-together leg with alphabetical order inside so the output is total and deterministic, and each step carries a path, a derived (never freeform) why line, and queue item references.
      2:
        requirement: The reading order must render in human_review.md and the HTML cockpit as the section after the verdict, while the sticky comment carries only the first leg; the tour must never include unchanged files.
        note: Halo files belong to the map, not the reading plan; a blocker still leads the cockpit — the tour serves the comprehension pass after the verdict.

  ARCH_DRIFT:
    name: Architecture-drift facts
    description: >-
      Visual uplift Phase 4 / milestone M11 (brainstorm idea 5). Deterministic
      facts for module-boundary import edges added or removed and import cycles
      created by a change, computed by diffing base-side and head-side resolved
      import sets for changed files only.
    requirements:
      1:
        requirement: For each changed or deleted file the tool must parse the base content (read via readFileAtRef) with the same import extraction the import graph already uses, diff the resolved import sets per file, aggregate to module altitude (top-level directory under src/), and emit module_edge_added, module_edge_removed, and import_cycle_created facts following the existing semantic-diff detector shape.
      2:
        requirement: Architecture-drift facts must route into the existing risk register as queue items, carry an architecture lens tag, and set kind new or removed on the matching change_graph edges so both the mermaid and SVG map renderers pick the drift up without extra work.
      3:
        requirement: Drift detection must respect rename detection (a moved file re-creating its old edges from a new path is not drift), and imports the resolver cannot resolve (such as tsconfig path aliases) must count as unknown, never as removed, with resolver bounds documented like the import graph's existing bounds.

  TREND:
    name: Review-round convergence trend
    description: >-
      Visual uplift Phase 4 / milestone M11 (brainstorm idea 7). A compact
      per-round ledger carried forward with the prior packet so reviewers of
      agent-written PRs can see whether successive rounds are converging.
    requirements:
      1:
        requirement: The tool must carry forward a rounds ledger with the prior packet — each entry recording round number, head SHA, new/resolved/regressed counts from the existing compare output, and verdict — appending one row per run, with item identity on stable finding keys, never array positions, and the ledger must work from both transports, CI artifacts and the local prior-packet directory.
      2:
        requirement: The sticky comment and the HTML cockpit must render the rounds ledger as a compact table capped at the last eight or so rounds with the full ledger preserved in the artifact, and partial history must render honestly (for example "history begins at round 3") and never as an error — a missing prior packet is the first-review case.

  COLD_START:
    name: Cold-start correctness and spec-less mode
    description: >-
      Open-source readiness uplift Phases 1-2 (docs/history/OPEN_SOURCE_UPLIFT_GOAL.md).
      Every requirement traces to an observed failure from the 2026-06-11
      cold-start evidence log: a shallow clone of sindresorhus/got (no Acai
      specs, no config) run with the mock provider. Heuristics that encode this
      repository's layout must be derived from the target repository's own
      signals or degrade to an honest generic answer. Requirements 6-8 extend
      this family for the release quick-wins uplift Phase 1
      (docs/history/QUICK_WINS_UPLIFT_GOAL.md, 2026-06-12 quick-wins evidence-log items
      1-3): the first command must review exactly the range it claims — base
      auto-resolution, working-tree honesty, and portable artifacts.
    requirements:
      1:
        requirement: validate (and every other schema consumer) must resolve schemas/ relative to the installed package root, for example via module-relative paths, never relative to the user's current working directory, and a regression test must run validate from a temporary working directory outside the repository.
        note: "Closes cold-start failure 1: validate --surface all failed with ENOENT .../got/schemas/review_packet.schema.json because schema paths resolved against the CWD."
      2:
        requirement: Reading-order file categorization must derive implementation roots from the target repository's own signals — tsconfig.json rootDir/include, package.json main/exports/files, and as fallback the top-level directories containing a majority of non-test source files — instead of a hardcoded src|bin|lib list, with the same detection feeding change-map clusters so map and tour stay in agreement, and detection reading committed files only with sorted iteration for determinism.
        note: "Closes cold-start failure 2: got's source/ directory fell through categoryOf() to 'config or docs - read last', telling the reviewer to read the heart of the change last."
      3:
        requirement: The exported-API differ must compare comment-stripped, whitespace-normalized signatures (for example printing nodes via the TS printer with comments removed, or comparing structural members) so trivia-only edits produce no signature-changed fact, with a seeded eval fixture asserting a doc-comment-only edit inside an exported type yields no signature-changed finding.
        note: "Closes cold-start failure 3: two TSDoc lines added inside PaginationOptions were reported as an exported API signature change, became the top review-first item, and generated a blocking suggested comment."
      4:
        requirement: The intent model and strict human-review schema must carry an explicit spec_mode flag ("acai" or "none") derived deterministically from whether zero Acai spec requirements were indexed.
        note: "Closes cold-start failure 4 (mechanism): the mode must be schema-visible model state, not renderer guesswork, so every renderer inherits it."
      5:
        requirement: In spec_mode none the packet must stop speaking Acai — per-cluster overreach findings and per-file requirement-mapping questions and actions are suppressed in favor of the single honest open question about unindexed requirements plus a one-line note that intent checks are limited to docs and constraints, and all renderers must hide empty spec-coupled sections rather than rendering zero-count requirement results — while test-weakening detection, trust audit, semantic facts, coverage, change map, reading order, and drift remain unchanged.
        note: "Closes cold-start failure 4: with zero specs, OVERREACH-001..003 covered 100 percent of the got diff and review actions said 'map the changed file to an Acai requirement'. Presentation and derivation logic only, not a second pipeline."
      6:
        requirement: The default --base must resolve through an explicit deterministic chain — origin/HEAD, origin/main, origin/master, main, master, first ref that resolves, merge-base semantics unchanged — and a base that does not resolve (explicitly passed, or the chain exhausted) must be a hard error with non-zero exit and no artifacts written, naming the ref or refs tried and giving the shallow-clone fixes (fetch-depth 0 for Actions, git fetch --unshallow locally), never a silent working-tree fallback; the resolved range (both refs with short SHAs) must be printed in the all summary and persisted as model state, and the README quickstart, help text, and init templates must drop the hard-coded origin/main in favor of the auto default.
        note: "Release quick-wins uplift Phase 1 (docs/history/QUICK_WINS_UPLIFT_GOAL.md). Closes quick-wins evidence item 1: --base defaults to a hard-coded origin/main and a non-resolving base silently falls back to a bare working-tree diff with a stderr-only diagnostic that is by design never persisted, so a master-default repo gets a confidently wrong (usually empty) verdict from the README quickstart, and CI shallow clones hit the same path."
      7:
        requirement: Working-tree and untracked files must be merged into the changed-file set only when the requested head resolves to the checked-out HEAD; an explicitly pinned head must produce a pure range diff, asserted by a test reproducing the dirty-tree-plus-pinned-range incident with byte-identical artifacts to a clean-tree run; and when the merge does contribute files, every human surface — the all summary, the human_review.md header, the cockpit header, and the sticky comment when nonzero — must carry one deterministic includes-N-uncommitted-files line.
        note: "Release quick-wins uplift Phase 1 (docs/history/QUICK_WINS_UPLIFT_GOAL.md). Closes quick-wins evidence item 2: collectChangedFiles unions git status --untracked-files=all into every run, even pinned historical ranges — the 2026-06-12 pinned 8-PR dogfood counted 104 files instead of 99 because five uncommitted files leaked in — and although the model already tags source working_tree, no rendered surface ever says uncommitted changes are included."
      8:
        requirement: No rendered artifact may contain a parent-directory ("../") path chain or an absolute filesystem path regardless of where --out points; artifact-embedded pointers must be computed repo-root-relative with a stable fallback when the artifact directory lies outside the repository, asserted by a test that runs with --out in a temporary directory outside the repo, scans every rendered artifact for ../ and absolute-path patterns, and compares artifact bytes against an in-repo --out run.
        note: "Release quick-wins uplift Phase 1 (docs/history/QUICK_WINS_UPLIFT_GOAL.md). Closes quick-wins evidence item 3: pointersForPacketPath embeds path.relative(cwd, packetPath) into rendered output, which produced ../../tmp/... chains twice on 2026-06-12 (the example packet and a cockpit screenshot header); both were worked around by re-running from a clean clone instead of fixing the renderer."

  DISTRIBUTION:
    name: Distribution and repository hygiene
    description: >-
      Open-source readiness uplift Phase 3 (docs/history/OPEN_SOURCE_UPLIFT_GOAL.md). Closes
      cold-start failure 5: the package is publish-ready but unpublished, has no
      LICENSE, and the README assumes Acai conventions and shows none of the
      shipped visuals. Requirements 5-8 extend this family for the pre-publish
      polish uplift Phase 3 (docs/history/POLISH_UPLIFT_GOAL.md, 2026-06-12 legibility
      evidence-log failures 5-6): showcase artifacts, README truth, quickstart
      cockpit surfacing, and publish trim. Requirements 9-13 extend it again
      for the release quick-wins uplift Phase 2 (docs/history/QUICK_WINS_UPLIFT_GOAL.md,
      2026-06-12 quick-wins evidence-log items 4-8): the package's first touch
      — version flag, Node floor guard, npm-page rendering, publish safety,
      and artifact-directory hygiene.
    requirements:
      1:
        requirement: The repository must contain a LICENSE file (MIT unless the owner directs otherwise) and a minimal CONTRIBUTING.md covering pnpm setup, local-gate, local-review, and PR expectations.
      2:
        requirement: Internal process documents (goal files, brainstorm docs, README.bootstrap.md) must move to docs/history/ with a short framing README explaining the tool was built by agents and reviewed with itself, and inbound references must be updated.
      3:
        requirement: README.md must be written for a stranger's first five minutes — leading with the trust questions it answers and a quickstart that works on a spec-less repository, a what-you-get tour with screenshots of the cockpit, change map, and sticky comment from a real run, an explicit scope statement that analysis depth is TS/JS-first (import graph and API diff are TypeScript; coverage via lcov and test-weakening are language-agnostic), and Acai specs introduced as the optional power-user layer rather than the prerequisite.
      4:
        requirement: The local gate must include a packaging smoke test verifying the pnpm pack tarball installs and runs from a temporary directory outside the repository; actual npm publish remains the owner's manual step, prepared but never run.
      5:
        requirement: The repository must contain docs/example/ with committed sample artifacts (human_review.md, human_review.html, comment.md) generated from the pinned got cold-start range (a5b76bffb, HEAD~3) with a frozen --now timestamp and verified redaction, plus a short framing README stating the exact commands that generated them, linked from the main README so a stranger can read a packet before installing.
        note: "Pre-publish polish uplift Phase 3 (docs/history/POLISH_UPLIFT_GOAL.md). Closes legibility evidence-log failure 5: no committed sample artifacts exist, so the three README PNGs are the only pre-install preview. This is the open-source uplift's deliberately skipped Phase 4, unblocked now that the artifacts are worth showing."
      6:
        requirement: docs/images/change-map.png must be regenerated from a real run so it shows the overview level at legible width, cockpit.png must be refreshed if the above-the-fold cockpit changed, and the README's change-map copy must describe the overview and zoom levels.
        note: "Pre-publish polish uplift Phase 3 (docs/history/POLISH_UPLIFT_GOAL.md). Closes the README half of failures 1 and 5: the committed change-map.png is a 4680x768 ribbon — the screenshot that sells the feature demonstrates the scaling bug."
      7:
        requirement: The review-surfaces all terminal summary must end with a pointer to the HTML cockpit (review-surfaces human --format html), or all must write human_review.html directly, so the flagship surface is discoverable from a stranger's first quickstart run.
        note: "Pre-publish polish uplift Phase 3 (docs/history/POLISH_UPLIFT_GOAL.md). Closes the quickstart half of failure 6: the all summary never mentions the cockpit."
      8:
        requirement: The repository must contain CHANGELOG.md with a condensed 0.1.0 history covering the five uplifts plus an Unreleased section, and the remaining internal proposal docs under docs/ must move to docs/history/ with inbound references updated and POLISH_UPLIFT_GOAL.md moved there and indexed in the history README; npm publish itself remains the owner's manual step.
        note: "Pre-publish polish uplift Phase 3 (docs/history/POLISH_UPLIFT_GOAL.md). Closes the publish-trim half of failure 6: no CHANGELOG for the npm listing, and docs/ still mixes internal proposals with user-facing docs."
      9:
        requirement: review-surfaces --version (and the bare version command) must print exactly the help header line — the package name and the shared VERSION constant — and exit 0, covered by the version-sync test family so the flag, the help header, src/core/version.ts, and package.json can never disagree.
        note: "Release quick-wins uplift Phase 2 (docs/history/QUICK_WINS_UPLIFT_GOAL.md). Closes quick-wins evidence item 4: verified live on v0.2.0, review-surfaces --version fails with 'Unknown command: --version' although it is the canonical first command after install."
      10:
        requirement: bin/review-surfaces.js must check process.versions.node before spawning the compiled CLI and exit 1 with one actionable stderr line when the major version is below the declared engines floor (naming the floor and the running version), while remaining parseable by older Node (plain CJS, no modern syntax) and keeping the no-dist run fallback working, asserted by a source-assertion test.
        note: "Release quick-wins uplift Phase 2 (docs/history/QUICK_WINS_UPLIFT_GOAL.md). Closes quick-wins evidence item 5: engines >=22 is declared but npx does not enforce it and dist targets ES2022, so Node 18/20 parses the CLI and dies mid-run with a bare TypeError on a newer API instead of one clear line."
      11:
        requirement: README.md must render correctly on the npm package page — image and example-packet links absolute (raw.githubusercontent.com for images, GitHub blob URLs for docs), with no relative ](docs/ or ](./ links — and package.json must carry homepage and bugs fields, with a test asserting both; whether docs/images then leaves the files allowlist is decided at implementation by the pack smoke test's size evidence.
        note: "Release quick-wins uplift Phase 2 (docs/history/QUICK_WINS_UPLIFT_GOAL.md). Closes quick-wins evidence item 6: all three screenshots and the example-packet link are repo-relative, which renders unreliably on npmjs.com and on mirrors, and the npm sidebar loses its two highest-click links because homepage and bugs are absent."
      12:
        requirement: The package.json prepublishOnly script must run the full local gate (pnpm run local-gate) so the owner's single manual npm publish step cannot ship a red gate, with a test asserting the script wiring and a CHANGELOG line saying publish runs the gate; npm publish itself remains the owner's manual step.
        note: "Release quick-wins uplift Phase 2 (docs/history/QUICK_WINS_UPLIFT_GOAL.md). Closes quick-wins evidence item 7: prepublishOnly only builds; the failure class is proven — a red gate shipped as 64e6d95 during the polish uplift because the gate's exit code was masked by a pipe."
      13:
        requirement: After writing artifacts, the CLI must print exactly one stderr hint suggesting the artifact directory be gitignored when that directory is inside the repository and is neither git-ignored nor already tracked, leaving stdout untouched so the asserted output-ordering contracts do not move, and the hint must not fire in this repository (ignored with tracked exceptions), asserted by tests.
        note: "Release quick-wins uplift Phase 2 (docs/history/QUICK_WINS_UPLIFT_GOAL.md). Closes quick-wins evidence item 8: review-surfaces all writes an un-ignored .review-surfaces/ (including a ~100 KB cockpit HTML) into a stranger's repo with no hint, so the next git add -A commits it."
      14:
        requirement: The published npm tarball must not ship compiled test files — the package file allowlist (or build/ignore configuration) must exclude dist/tests so only runtime code, schemas, and docs/example reach consumers, asserted by a test that inspects the resolved pack manifest and finds no dist/tests entry.
        note: "ci-trust uplift Phase 7 (docs/history/CI_TRUST_UPLIFT_GOAL.md). npm pack shipped 1.6 MB / 87 compiled test files (over half the unpacked tarball); the bin shim only loads dist/src."
      15:
        requirement: README must document consuming the tool in CI — a copy-pasteable GitHub Action `uses:` snippet (linking the worked example workflow) and an exit-code table sourced from src/core/exit-codes.ts mapping each code to its meaning — so a CI author can wire the action and branch on exit codes without reading action.yml.
        note: "ci-trust uplift Phase 7. The README references the reusable Action three times with no usage snippet and sells --strict 'for CI' without documenting the exit codes CI gates on."

  MAP_SCALE:
    name: Change-map legibility at scale
    description: >-
      Pre-publish polish uplift Phases 1-2 (docs/history/POLISH_UPLIFT_GOAL.md). Every
      requirement traces to the 2026-06-12 legibility evidence log: on wide
      ranges (this repo's last 8 PRs, 99 files; got HEAD~40, 87 files) the
      change map renders at 16-55 percent of natural size, hides 74 of 99
      files behind "+ N more", and silently drops edges touching capped
      files. Standing rule: a visual that cannot render legibly must
      summarize, never shrink — scale-to-fit below ~90 percent of natural
      size is a rendering bug, and overflow stays explicit, including edges.
      This family extends the surfaces CHANGE_MAP.2-4 own; their caps,
      sanitizer, embed guards, and determinism checks remain in force.
    requirements:
      1:
        requirement: The change_graph model and strict human-review schema must grow an overview section whose groups are the model clusters merged by first path segment (the "(root)" cluster stays itself), each group carrying its file count, cluster count, churn added/removed totals, dominant risk lens with a deterministic tie-break, and review-queue item count, plus one aggregate dashed halo entry and aggregated inter-group edges each carrying weight equal to the number of underlying model edges and has_new/has_removed flags; the overview must be derived from the same change_graph model the tour and queue use — no renderer-local clustering — and ship additively, model-and-strict-schema-first.
        note: "Phase 1. Closes the model half of failure 4: clusterOfPath already emits two-level cluster keys, but no schema-visible high-level grouping exists for any renderer to lead with."
      2:
        requirement: One legibility-budget helper (a single module with shared constants) must decide per surface whether the file-level map or the overview leads; renderers must not carry private size thresholds, and when the file-level map exceeds the budget the overview must lead on every surface — cockpit SVG, markdown mermaid, and sticky comment — via same-model dual emitters, while small diffs (the pinned got a5b76bffb HEAD~3 range) keep the file-level map leading with today's structure.
        note: "Phase 1. Closes failure 1 (8-PR cockpit map rendered at ~16 percent, labels ~2px) and failure 3 (the 8-PR sticky embeds a 151-line mermaid flowchart whose only size control deletes the map entirely)."
      3:
        requirement: The overview must be honest by construction — group file counts must sum to the full changed-file count and aggregated edge weights must account for every model edge between groups — with ACID-named tests reproducing the 8-PR fixture (23 clusters, 99 files) and asserting the overview leads, fits the budget, and that both sums add up.
        note: "Phase 1. Closes failure 2: MAX_CHANGED_NODES leaves 74 of 99 files represented only as '+ N more' texts and edges touching capped files vanish with no note, violating the never-silent rule."
      4:
        requirement: Each overview group must expand to a detail view containing its model clusters and files, intra-group edges, cross-group edges rendered as explicit stub ports (for example "-> src/render x3"), and its share of the halo, with a per-view node cap rendering an explicit "+ N more"; detail views must use the model clusters the queue and tour reference verbatim so map/tour agreement holds, and every changed file must appear in exactly one detail view, asserted on the 99-file fixture.
        note: "Phase 2. Closes failure 4 (no zoom level exists although the model is already two-level) and keeps the never-silent rule inside each zoomed view."
      5:
        requirement: All SVG map layouts must wrap — columns wrap into rows and long file stacks wrap — so that no rendered SVG (overview, detail, or small-diff file-level) exceeds the width budget; height may grow but width never, and the typical-PR file-level map (the pinned aefc63c~1..aefc63c range, previously 1792px natural width rendered at ~55 percent) must render at or above ~94 percent of natural size as a single wrapped file-level map.
        note: "Phase 2. Closes failure 1's typical-PR case and enforces the summarize-never-shrink standing rule: scale-to-fit below ~90 percent of natural size is a rendering bug."
      6:
        requirement: In the cockpit, clicking an overview group must toggle that group's pre-rendered hidden detail SVG using vanilla JS with deterministic markup and the same data- attribute pattern as existing filters, while file clicks inside a detail view keep filtering the review queue exactly as today; human_review.md must render one collapsed details block per group containing its detail mermaid in deterministic order with the embed guard applied per block; the sticky comment stays overview-only.
        note: "Phase 2. Closes the interaction half of failures 3 and 4: the cockpit's only interaction is node-click-filters-queue, and a reviewer cannot ask 'show me just src' anywhere."

  QUALITY_GATE:
    name: CI quality gate and machine-readable summaries
    description: >-
      ci-trust uplift (docs/history/CI_TRUST_UPLIFT_GOAL.md). Turn the deterministic packet
      into CI-gating and machine-consumable surfaces without recomputing the
      pipeline: a risk-severity gate flag and JSON summary projections a workflow
      can branch on.
    requirements:
      1:
        requirement: The quality gate must support failing on deterministic risk severity — a --fail-on <severity> flag (and a config quality_gate.fail_on default) makes the gate decision return the quality-gate-failed code when any non-hypothesis risk item at or above the threshold exists, composing with the existing --strict process-exit behavior.
        note: "gateDecision never inspected packet.risks; only evaluation results and the provider/privacy boundary gated."
      2:
        requirement: A deterministic `comment --format json` renderer must read the local review_packet.json and emit a compact, byte-stable JSON summary (gate code, per-status requirement counts, risk-severity histogram, top-N queue ids) for CI consumers, recomputing nothing — mirroring the SARIF renderer.
      3:
        requirement: The `all` and `packet` commands must accept an opt-in --json flag that prints the same structured run summary to stdout while keeping default prose output byte-stable, so a CI step can read one structured line instead of re-parsing artifacts.

  ACTION_IO:
    name: GitHub Action inputs, outputs, and run surfaces
    description: >-
      ci-trust uplift. Make the reusable composite action consumable and visible
      from a workflow — declared outputs, a run-UI step summary, and Marketplace
      branding — all reusing the already-rendered local artifacts.
    requirements:
      1:
        requirement: action.yml must declare an outputs block (gate code, missing/invalid/risk counts, artifact name, comment path) populated from the generation step via $GITHUB_OUTPUT, so a consuming workflow can branch on the result.
      2:
        requirement: The action must append the rendered review summary (comment.md, or a trimmed top-N) to $GITHUB_STEP_SUMMARY in a best-effort step so the verdict appears in the Actions run UI even on fork PRs where the comment is not posted.
      3:
        requirement: action.yml must carry a top-level branding block (icon and color) so the advertised reusable action is GitHub Marketplace-publishable.

  PERF:
    name: Deterministic performance and spawn economy
    description: >-
      ci-trust uplift. Cut redundant work on large repositories with pure,
      output-identical optimizations — no behavior or artifact change, guarded by
      tests asserting the reduced work.
    requirements:
      1:
        requirement: buildImportGraph must memoize the injected existence probe so each distinct repo-relative path triggers at most one underlying lookup per build, asserted by a test that the injected exists fake is called at most once per distinct path.
        note: "Measured 6322 git cat-file spawns on a 256-file repo (21.7x redundancy; one blob probed 106 times)."
      2:
        requirement: Hot deterministic loops must avoid redundant rescans — the PR-scope affected-areas accumulation precomputes area ids by group key instead of rescanning all review areas per file, and the transitive-attribution BFS pre-sorts edge sets once rather than per visit — output-identical, asserted by existing-shape tests.

constraints:
  EVIDENCE:
    name: Evidence, determinism, and trust
    description: Claims must be grounded and machine-checkable.
    requirements:
      1:
        requirement: Code must control workflow orchestration, schema validation, evidence validation, caching, and exits.
      2:
        requirement: Every substantive generated claim must link to evidence or be marked unknown, assumption, hypothesis, or missing evidence.
      3:
        requirement: LLM-emitted file paths, line ranges, commands, test names, ACIDs, and event IDs must be validated.
      4:
        requirement: Invalid references must become invalid_evidence findings rather than trusted facts.
      5:
        requirement: The tool must work in local/offline mode with mock or disabled LLM modules.
      6:
        requirement: The packet must clearly distinguish verified evidence from agent claims.
      7:
        requirement: PR narrative output must answer what changed, why it matters, and where to look first, and each core section must survive evidence validation before the surface is postable.

  HUMAN_TRUST:
    name: Human reviewer trust
    description: Human surfaces must be action-oriented, bounded, evidence-backed, and conservative when evidence is missing.
    requirements:
      1:
        requirement: Merge-readiness decisions must degrade conservatively when required evidence is missing.
      2:
        requirement: LLM output may improve prose but must not create blockers, clear blockers, set coverage status, or set merge-readiness verdicts.
      3:
        requirement: Every human-review action must cite evidence or be explicitly marked as a question, assumption, or missing-evidence item.
      4:
        requirement: Human-review Markdown must fit on one readable screen for the top summary and link to deeper artifacts for details.
      5:
        requirement: Human surfaces must avoid generic AI review boilerplate.

  PRIVACY:
    name: Security and privacy
    description: Avoid leaking sensitive files, logs, and secrets.
    requirements:
      1:
        requirement: Raw conversation logs must not be copied into public artifacts by default.
      2:
        requirement: Secret scanning or redaction must run before any remote LLM call.
      3:
        requirement: .review-surfacesignore must exclude sensitive files and logs deterministically.
      4:
        requirement: The tool must not infer private context that is absent from files or logs.
      5:
        requirement: PR-mode remote prompts must be secret-scanned, redacted, and blocked on high-risk material before any LLM call.
      6:
        requirement: Every postable or persisted surface that can carry diff-derived or model text must run secret redaction and honor the high-risk block signal — specifically the privacy ignore-diff filter must fail closed (drop a diff section whose `diff --git` header cannot be parsed into both paths, including git-quoted or space-containing paths), the GitHub draft-review export (pending_review.json and its stdout copy) must redact secrets and refuse to write or print a blocked payload, and provider-credential secret patterns (including google_api_key) must set the remote-block signal consistently.
        note: "ci-trust uplift Phase 1 (docs/history/CI_TRUST_UPLIFT_GOAL.md). Closes three confirmed leaks: filterIgnoredDiff kept ignored sections when its greedy regex failed on quoted paths; pending_review.json was the only postable surface with zero redactSecrets; google_api_key was blocked:false against the in-file 'all provider tokens blocked' invariant. Also anchors the existing PRIVACY.5 block-before-LLM behavior with an exact-ACID test."

  QUALITY:
    name: Testing and release quality
    description: Test deterministic logic, schemas, fixtures, LLM boundaries, and dogfood loops.
    requirements:
      1:
        requirement: Unit tests must cover Acai parsing, ACID generation, config loading, evidence validation, and schema validation.
      2:
        requirement: Fixture tests must cover sparse specs, conflicting docs, overreach, missing tests, missing logs, and invalid evidence.
      3:
        requirement: End-to-end tests must run the CLI against fixture repositories using llm.mock.
      4:
        requirement: Golden tests should assert structure and critical findings, not brittle full prose.
      5:
        requirement: Dogfood runs must record limitations when modules are not implemented yet.
      6:
        requirement: CI/PR integration must remain optional until the local pipeline is useful.
      7:
        requirement: The tool should fail gently during early local dogfood runs and hard-fail only for explicit validation commands or configured gates.
      8:
        requirement: Generated review packets must be compact enough for human review.

  SCHEMA:
    name: Machine-readable artifact schemas
    description: Keep review packet contracts aligned with generated local artifacts.
    requirements:
      1:
        requirement: schemas/review_packet.schema.json must validate review_packet.json fields for architecture diagram validation metadata.
      2:
        requirement: schemas/review_packet.schema.json must validate methodology claim evidence metadata and agent handoff validation/deferral metadata.
      3:
        requirement: schemas/human_review.schema.json must require every field present in the current HumanReviewModel, or expose a versioned strict validation mode, so stale partial human_review.json artifacts fail validation instead of degrading quietly.
      4:
        requirement: The human review strict schema must reject unknown properties — the top-level object and the high-churn nested objects (verdict, evidence refs, risk-lens findings, change-graph nodes) set additionalProperties:false — so a misspelled or stale field fails `validate --surface human` instead of validating clean and rendering empty, asserted by tests that an artifact carrying an unknown property is rejected.
        note: "ci-trust uplift Phase 2 (docs/history/CI_TRUST_UPLIFT_GOAL.md). human_review.schema.json was additionalProperties:true in 55 places; a bogus field and a typo'd risk_lens_finding validated clean."
      5:
        requirement: The review packet schema must bound agent-influenceable arrays and free-text with maxItems/maxLength caps (mirroring the existing uncovered_lines maxItems-plus-truncated pattern), so a provider cannot bloat review_packet.json unbounded while still passing validation, asserted by a test that the caps exist.
        note: "ci-trust uplift Phase 2. review_packet.schema.json declared zero maxItems/maxLength; a mock run wrote a ~700 KB packet that still validated."
      6:
        requirement: Schema-version and enum drift must be test-guarded across all artifact schemas — pr_review_surface.schema.json schema_version const asserted equal to PR_SURFACE_SCHEMA_VERSION (as packet and human already are), and the risk-lens and evidence-kind enums duplicated in human_review.schema.json hoisted to a single definition (or otherwise tied by test) to the runtime RISK_LENSES and PACKET_EVIDENCE_KINDS source of truth.
        note: "ci-trust uplift Phase 2. The PR-surface const had no guard test; the lens enum was inline-duplicated three times with only the $defs copy guarded."
