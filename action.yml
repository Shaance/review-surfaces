# review-surfaces.PR_SURFACE.1/.3: a reusable composite action that runs the
# local review-surfaces pipeline on a pull request, posts ONE idempotent sticky
# comment rendered from human_review.json, and uploads the full .review-surfaces/
# directory as a workflow artifact. It is a renderer over local artifacts, never a
# separate analysis path: it calls the same CLI commands a local user runs.
#
# Defaults to --provider mock so a consuming repository gets full value with zero
# secrets. The deterministic sticky needs no LLM; an LLM provider only enriches the
# uploaded artifact's narrative and is never required to post.
#
# Fork-handling contract (the caller decides via inputs, the action just obeys):
# pass provider=mock + llm-api-key='' + post=false for fork PRs (upload-only, no
# secrets), and provider=ai-sdk + the key + post=true for same-repo PRs.
name: review-surfaces PR surface
description: Run review-surfaces on a PR, post a sticky human-review summary, and upload the artifact.
# review-surfaces.ACTION_IO.3: a Marketplace-publishable branding block (a valid
# Feather icon + color) so the reusable action can be listed.
branding:
  icon: shield
  color: purple
inputs:
  provider:
    description: review-surfaces provider (mock | ai-sdk | agent-file). Default mock — zero secrets.
    required: false
    default: mock
  model:
    description: LLM model id for --provider ai-sdk (e.g. google:gemini-2.5-flash). Ignored for mock.
    required: false
    default: ""
  llm-api-key:
    description: Optional LLM API key, set as env only for the trusted generation step. Empty for mock.
    required: false
    default: ""
  base-ref:
    description: >-
      Base ref to diff against. Empty (the default) lets the CLI auto-resolve
      the default branch (origin/HEAD, origin/main, origin/master, main,
      master — review-surfaces.COLD_START.6). When set, the ref must be
      fetched in the subject checkout (actions/checkout with fetch-depth: 0,
      or an explicit fetch of the base branch); an unfetched base is a hard,
      actionable error — never a silently wrong review.
    required: false
    default: ""
  head-ref:
    description: Head ref to review.
    required: false
    default: HEAD
  change-title:
    description: Author-provided pull request title used as the primary change purpose.
    required: false
    default: ""
  change-description:
    description: Author-provided pull request body used as supporting purpose context.
    required: false
    default: ""
  spec:
    description: Feature spec path.
    required: false
    default: features/review-surfaces.feature.yaml
  output-dir:
    description: Output directory for .review-surfaces artifacts.
    required: false
    default: .review-surfaces
  subject-directory:
    description: Working directory holding the PR code to analyze (the credentialless subject checkout).
    required: false
    default: "."
  pr-number:
    description: PR number, used to key the uploaded artifact and to post the sticky comment.
    required: true
  repository:
    description: owner/repo, used for artifact lookup and comment posting.
    required: false
    default: ""
  post:
    description: Whether to upsert the sticky comment (set false for fork PRs — upload only).
    required: false
    default: "true"
  github-token:
    description: Token with pull-requests:write and actions:read, for posting and prior-artifact lookup.
    required: false
    default: ""
# review-surfaces.ACTION_IO.1: declared outputs a consuming workflow can branch
# on, populated from the deterministic packet/gate values via $GITHUB_OUTPUT. No
# recomputation. The privacy-INDEPENDENT counts (missing/invalid/risk) come from the
# renderer-only run-summary JSON the summary step produces (comment --format json).
# gate-code is the EXCEPTION (Codex finding 1): it is the REAL gate the generation
# step ran over the live provider + collection — the only place a privacy block is
# observable — so it is sourced from that step, not re-projected by the renderer.
outputs:
  gate-code:
    description: The review-surfaces gate exit code (0 pass; 4 evidence; 5 privacy; 10 quality/risk).
    # Codex finding 1: sourced from the GENERATION step, which runs the real gate
    # over the live provider + collection. The renderer-only summary step cannot
    # reconstruct a privacy block (the packet records neither the block nor the
    # provider), so a blocked ai-sdk run would otherwise report 0 here.
    value: ${{ steps.generate.outputs.gate-code }}
  missing-count:
    description: Number of requirements with status "missing".
    value: ${{ steps.summary.outputs.missing-count }}
  invalid-count:
    description: Number of requirement results with status "invalid_evidence".
    value: ${{ steps.summary.outputs.invalid-count }}
  risk-count:
    description: Number of deterministic (non-hypothesis) risk items in the packet.
    value: ${{ steps.summary.outputs.risk-count }}
  artifact-name:
    description: The uploaded artifact name (review-surfaces-pr-<pr-number>).
    value: ${{ steps.summary.outputs.artifact-name }}
  comment-path:
    description: Path to the rendered sticky comment.md.
    value: ${{ steps.summary.outputs.comment-path }}
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.8.0
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        # No pnpm cache here: github.action_path resolves to `<root>/.` for a
        # `uses: ./` consumer, and setup-node rejects the resulting `/.//` cache
        # pattern. The install below is `--frozen-lockfile`, so it is reliable
        # uncached; consumers that want caching can prime it in their own workflow.
    - name: Build trusted tool
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        pnpm install --frozen-lockfile
        pnpm run build
    - name: Recover previous review packet (since-last-review state)
      id: prior
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ inputs.repository || github.repository }}
        GH_PR_NUMBER: ${{ inputs.pr-number }}
        REPO: ${{ inputs.repository || github.repository }}
        ARTIFACT: review-surfaces-pr-${{ inputs.pr-number }}
        SUBJECT: ${{ inputs.subject-directory }}
        RS_STICKY: ${{ github.action_path }}/bin/review-surfaces-sticky.js
      run: |
        # review-surfaces.PR_SURFACE.5: recover the packet from the LAST POSTED
        # sticky, not merely the most recent upload. The posted sticky carries a
        # `run=<id>` fingerprint; we read it and download THAT run's artifact, so a
        # run that uploaded but failed to post never becomes the baseline and the
        # delta is always computed against what the reviewer last saw. A missing
        # sticky / fingerprint / expired artifact (or no token) is the FIRST-REVIEW
        # case, never an error.
        set +e
        prev_dir="$RUNNER_TEMP/rs-prev"
        echo "previous-packet=" >> "$GITHUB_OUTPUT"
        if [ -z "$GH_TOKEN" ]; then
          echo "No token for sticky lookup; treating as first review."; exit 0
        fi
        sticky_json="$(node "$RS_STICKY" 2>/dev/null)"
        sticky_status="$(printf '%s' "$sticky_json" | jq -r '.status // "error"' 2>/dev/null)"
        prior_head="$(printf '%s' "$sticky_json" | jq -r '.head_sha // ""' 2>/dev/null)"
        prior_run="$(printf '%s' "$sticky_json" | jq -r '.run_id // ""' 2>/dev/null)"
        if [ "$sticky_status" != "found" ] || [ -z "$prior_head" ]; then
          echo "No exact final fingerprint on an owned prior sticky; first review."; exit 0
        fi
        case "$prior_run" in ""|*[!0-9]*) echo "No prior posted sticky with a run fingerprint; first review."; exit 0 ;; esac
        id="$(gh api "repos/$REPO/actions/runs/$prior_run/artifacts" \
          --jq ".artifacts[] | select(.name==\"$ARTIFACT\") | .id" 2>/dev/null | head -n1)"
        case "$id" in ""|null|*[!0-9]*) echo "Prior sticky run $prior_run has no recoverable artifact (expired?); first review."; exit 0 ;; esac
        rm -rf "$prev_dir" && mkdir -p "$prev_dir"
        if gh api "repos/$REPO/actions/artifacts/$id/zip" > "$RUNNER_TEMP/rs-prev.zip" 2>/dev/null \
          && unzip -q -o "$RUNNER_TEMP/rs-prev.zip" -d "$prev_dir" 2>/dev/null \
          && [ -f "$prev_dir/review_packet.json" ]; then
          packet_head="$(jq -r '.manifest.head_sha // ""' "$prev_dir/review_packet.json" 2>/dev/null)"
          if [ "$packet_head" = "$prior_head" ]; then
            echo "previous-packet=$prev_dir" >> "$GITHUB_OUTPUT"
            echo "Recovered the last posted sticky's packet from run $prior_run (artifact #$id)."
          else
            echo "Prior artifact head does not match the posted fingerprint; first-review fallback."
          fi
        else
          echo "Prior artifact present but unreadable; first-review fallback."
        fi
    - name: Generate PR review surface (trusted tool)
      id: generate
      shell: bash
      working-directory: ${{ inputs.subject-directory }}
      # All caller-supplied inputs flow through env, never interpolated into the
      # script: a ref name can contain shell metacharacters such as $(...), so
      # `--head ${{ inputs.head-ref }}` would let a PR-controlled ref execute code
      # in this step (which also holds the LLM key). Referenced below as "$VAR".
      env:
        RS_BIN: ${{ github.action_path }}/bin/review-surfaces.js
        RS_CONFIG: ${{ github.action_path }}/review-surfaces.config.yaml
        GOOGLE_GENERATIVE_AI_API_KEY: ${{ inputs.llm-api-key }}
        PREVIOUS_PACKET: ${{ steps.prior.outputs.previous-packet }}
        RS_PROVIDER: ${{ inputs.provider }}
        RS_MODEL: ${{ inputs.model }}
        RS_BASE: ${{ inputs.base-ref }}
        RS_HEAD: ${{ inputs.head-ref }}
        RS_CHANGE_TITLE: ${{ inputs.change-title }}
        RS_CHANGE_DESCRIPTION: ${{ inputs.change-description }}
        RS_SPEC: ${{ inputs.spec }}
        RS_OUT: ${{ inputs.output-dir }}
        RS_ARTIFACT: review-surfaces-pr-${{ inputs.pr-number }}
        RS_ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        # The output tree is replaced during an exact-head cache seed. Resolve
        # and validate it before ANY read/write/delete so a malformed action
        # input (absolute outside path, traversal, or a PR-controlled symlink)
        # cannot escape the credentialless subject checkout.
        subject_root="$(pwd -P)"
        case "$RS_OUT" in
          ""|*$'\n'*|*$'\r'*)
            echo "Unsafe output directory: expected a non-empty single-line path inside the subject checkout." >&2
            exit 1
            ;;
        esac
        case "/$RS_OUT/" in
          *"/../"*)
            echo "Unsafe output directory: traversal components are not allowed." >&2
            exit 1
            ;;
        esac
        lexical_out="$(node -e 'process.stdout.write(require("node:path").resolve(process.env.RS_OUT || ""))' 2>/dev/null || true)"
        case "$lexical_out" in
          "$subject_root"/*) ;;
          *)
            echo "Unsafe output directory: it must be a descendant of the subject checkout." >&2
            exit 1
            ;;
        esac
        relative_out="${lexical_out#"$subject_root"/}"
        cursor="$subject_root"
        old_ifs="$IFS"
        IFS='/' read -r -a output_parts <<< "$relative_out"
        IFS="$old_ifs"
        for part in "${output_parts[@]}"; do
          cursor="$cursor/$part"
          if [ -L "$cursor" ]; then
            echo "Unsafe output directory: symlinked output paths are not allowed." >&2
            exit 1
          fi
          if [ -e "$cursor" ] && [ ! -d "$cursor" ]; then
            echo "Unsafe output directory: an existing path component is not a directory." >&2
            exit 1
          fi
        done
        RS_OUT="$lexical_out"
        printf 'safe-output-dir=%s\n' "$relative_out" >> "$GITHUB_OUTPUT"
        # Output boundary validated.
        prev_flag=()
        # A prior posted artifact has two distinct jobs. On a new head it is
        # comparison input (`--previous-packet`). On the exact same head it is a
        # cache seed, but NOT comparison input: the previous-packet path/content
        # participates in the audit signature and would prevent an otherwise
        # valid same-head cache hit (for example after a PR title/body edit).
        #
        # Current-head command evidence is staged in $RS_OUT/commands before this
        # action runs. Never inherit the prior run's commands and never discard the
        # newly staged directory while seeding. Copy the seed off to a temporary
        # directory, replace its commands with the current directory, and only
        # then install it as $RS_OUT. Changed evidence therefore changes the cache
        # input and misses correctly; byte-identical evidence can hit.
        prior_head=""
        current_head="$(git rev-parse --verify "${RS_HEAD}^{commit}" 2>/dev/null || true)"
        if [ -n "$PREVIOUS_PACKET" ] \
          && [ -d "$PREVIOUS_PACKET" ] \
          && [ ! -L "$PREVIOUS_PACKET" ] \
          && [ -f "$PREVIOUS_PACKET/review_packet.json" ] \
          && [ ! -L "$PREVIOUS_PACKET/review_packet.json" ]; then
          prior_head="$(jq -r '.manifest.head_sha // ""' "$PREVIOUS_PACKET/review_packet.json" 2>/dev/null || true)"
        fi
        if [[ "$prior_head" =~ ^[0-9a-f]{40}$ ]] && [ "$prior_head" = "$current_head" ]; then
          case "$RS_OUT" in
            ""|/|.|..)
              echo "Unsafe output directory; skipping same-head cache seed."
              ;;
            *)
              seed_root="$(mktemp -d "$RUNNER_TEMP/rs-cache-seed.XXXXXX" 2>/dev/null || true)"
              seed_out=""
              current_commands=""
              seed_ok=true
              commands_present=false
              if [ -z "$seed_root" ]; then
                seed_ok=false
              else
                seed_out="$seed_root/output"
                current_commands="$seed_root/current-commands"
                if ! mkdir -p "$seed_out" || ! cp -a "$PREVIOUS_PACKET/." "$seed_out/"; then
                  seed_ok=false
                fi
              fi
              # The old command directory is never a cache input for this run.
              if [ "$seed_ok" = true ]; then rm -rf -- "$seed_out/commands"; fi
              if [ -L "$RS_OUT/commands" ] || { [ -e "$RS_OUT/commands" ] && [ ! -d "$RS_OUT/commands" ]; }; then
                echo "Current command evidence is not a regular directory; skipping cache seed."
                seed_ok=false
              elif [ -d "$RS_OUT/commands" ]; then
                commands_present=true
                if ! mkdir -p "$current_commands" || ! cp -a "$RS_OUT/commands/." "$current_commands/"; then
                  seed_ok=false
                fi
              fi
              if [ "$seed_ok" = true ]; then
                if [ "$commands_present" = true ]; then
                  if ! mkdir -p "$seed_out/commands" || ! cp -a "$current_commands/." "$seed_out/commands/"; then
                    seed_ok=false
                  fi
                fi
              fi
              if [ "$seed_ok" = true ]; then
                mkdir -p "$(dirname "$RS_OUT")"
                rm -rf -- "$RS_OUT"
                mv "$seed_out" "$RS_OUT"
                echo "Seeded the cache from the prior artifact at the exact current head; preserved current command evidence."
              else
                echo "Prior artifact could not be safely seeded; continuing without a cache seed."
              fi
              [ -z "$seed_root" ] || rm -rf -- "$seed_root"
              ;;
          esac
        elif [[ "$prior_head" =~ ^[0-9a-f]{40}$ ]]; then
          # A valid prior artifact from another head remains useful for the
          # since-last-review comparison, but must never seed this head's cache.
          prev_flag=(--previous-packet "$PREVIOUS_PACKET")
        elif [ -n "$PREVIOUS_PACKET" ]; then
          echo "Prior artifact is missing or invalid; treating this as a first review."
        fi
        model_flag=()
        if [ -n "$RS_MODEL" ]; then model_flag=(--model "$RS_MODEL"); fi
        # review-surfaces.COLD_START.6: pass --base only when the caller set
        # base-ref, so the default run uses the CLI's auto-resolution chain
        # (origin/HEAD, origin/main, origin/master, main, master) instead of a
        # hard-coded origin/main that fails on master-default repositories.
        # A default actions/checkout fetches a single ref at depth 1, leaving
        # NO base candidate and no merge-base history, so the default path
        # fetches the remote default branch (and unshallows) first —
        # best-effort: if it still cannot resolve, the CLI's hard preflight
        # error names the fix instead of producing a silently wrong review.
        base_flag=()
        if [ -n "$RS_BASE" ]; then
          base_flag=(--base "$RS_BASE")
        else
          default_branch="$(git ls-remote --symref origin HEAD 2>/dev/null | awk '/^ref:/ {sub("refs/heads/","",$2); print $2; exit}')"
          if [ -n "$default_branch" ]; then
            git fetch --no-tags origin "+refs/heads/$default_branch:refs/remotes/origin/$default_branch" 2>/dev/null || true
          fi
          if [ "$(git rev-parse --is-shallow-repository 2>/dev/null)" = "true" ]; then
            git fetch --unshallow --no-tags origin 2>/dev/null || true
          fi
        fi
        # review-surfaces.ACTION_IO.1 (Codex finding 1): capture the REAL gate code
        # HERE, in the generation step that actually runs the gate over the live
        # provider + collection. The packet's manifest does NOT record the privacy
        # block or the run's provider, so the renderer-only `comment --format json`
        # in the summary step below cannot reconstruct a privacy gate: a
        # `provider=ai-sdk` run over a remote_provider_blocked diff gates as privacy
        # code 5 here, but the summary step would re-project a clean local mock
        # context and report 0. So `--json` is passed to `all` and the run-summary
        # line it prints (gated over the live context) is the authoritative gate
        # code, written to this step's $GITHUB_OUTPUT for the action's gate-code.
        all_status=0
        all_out="$(node "$RS_BIN" all \
          --provider "$RS_PROVIDER" \
          "${model_flag[@]}" \
          --config "$RS_CONFIG" \
          --redact-secrets true \
          "${base_flag[@]}" \
          --head "$RS_HEAD" \
          --change-title "$RS_CHANGE_TITLE" \
          --change-description "$RS_CHANGE_DESCRIPTION" \
          --spec "$RS_SPEC" \
          --dogfood \
          --review-scope pr \
          --cache \
          --json \
          "${prev_flag[@]}" \
          --out "$RS_OUT")" || all_status=$?
        printf '%s\n' "$all_out"
        # The run summary is a SINGLE compact JSON line amid the prose; pick exactly
        # that line and read its gate_code (the real gate, incl. a privacy block 5).
        # `|| true` keeps a no-match from aborting under `set -eo pipefail` — a
        # missing summary line is the best-effort blank-gate-code case, never fatal.
        gate_line="$(printf '%s\n' "$all_out" | grep -F '"review-surfaces.run-summary.v1"' | tail -n1 || true)"
        # Node is already a hard dependency of this action; jq is not available in
        # every supported runner/container. Parse the single summary line without
        # silently turning a clean gate into a missing action output.
        gate_code="$(node -e '
          try {
            const value = JSON.parse(process.argv[1]).gate_code;
            if (Number.isInteger(value) && value >= 0) process.stdout.write(String(value));
          } catch {}
        ' "$gate_line" 2>/dev/null || true)"
        # A privacy exit may occur before a summary line is available. Preserve
        # the authoritative process status so the cleanup-only step can remove
        # an older approval brief without ever entering the posting path.
        if [ "$all_status" -eq 5 ]; then gate_code=5; fi
        case "$gate_code" in
          ''|*[!0-9]*) echo "Could not read a numeric gate_code from the run summary (best-effort); leaving gate-code blank." ;;
          *) echo "gate-code=$gate_code" >> "$GITHUB_OUTPUT" ;;
        esac
        if [ "$all_status" -ne 0 ]; then exit "$all_status"; fi
        node "$RS_BIN" validate "$RS_OUT"
        # review-surfaces.PR_SURFACE.2/.4: render the deterministic sticky from
        # human_review.json. Redaction and the secret-block postability gate run
        # inside the renderer; --strict-postability makes a blocked body a non-zero
        # exit so the action fails before the later upload/post steps run — a
        # blocked sticky is never posted. Suggested comments stay local drafts
        # (PROVIDERS.7) and are never posted here.
        comment_status=0
        node "$RS_BIN" comment \
          --review-scope pr \
          --format sticky \
          --config "$RS_CONFIG" \
          --strict-postability \
          --artifact-name "$RS_ARTIFACT" \
          --artifact-url "$RS_ARTIFACT_URL" \
          --run-id "$GITHUB_RUN_ID" \
          --out "$RS_OUT" || comment_status=$?
        # Strict postability is a second privacy boundary. If it blocks after a
        # clean pipeline gate, publish code 5 before returning the failure.
        if [ "$comment_status" -eq 5 ]; then echo "gate-code=5" >> "$GITHUB_OUTPUT"; fi
        exit "$comment_status"
    - name: Emit outputs and run-UI summary (best-effort, renderer-only)
      id: summary
      shell: bash
      working-directory: ${{ inputs.subject-directory }}
      # review-surfaces.ACTION_IO.1: populate the privacy-INDEPENDENT declared
      # outputs (missing/invalid/risk counts) from the deterministic run-summary
      # JSON (comment --format json) — a RENDERER over the local packet, no network
      # and no recomputation. gate-code is NOT emitted here: a renderer cannot see a
      # privacy block (the packet records neither the block nor the run's provider),
      # so the generation step that ran the real gate owns gate-code (Codex finding 1).
      # review-surfaces.ACTION_IO.2: append the rendered comment.md (trimmed) to
      # $GITHUB_STEP_SUMMARY so the verdict shows in the Actions run UI even on
      # fork PRs where the comment is never posted. Best-effort: a missing packet
      # or summary never fails the action.
      env:
        RS_BIN: ${{ github.action_path }}/bin/review-surfaces.js
        # review-surfaces.ACTION_IO.1: the run-summary projection is config-derived
        # (the counts read quality_gate.max_missing/fail_on), so the outputs step
        # MUST use the SAME config the generate step used (the action's bundled
        # config). Without it a consumer repo whose own review-surfaces.config.yaml
        # differs would project missing-count over the WRONG config.
        RS_CONFIG: ${{ github.action_path }}/review-surfaces.config.yaml
        RS_OUT: ${{ steps.generate.outputs.safe-output-dir }}
        RS_ARTIFACT: review-surfaces-pr-${{ inputs.pr-number }}
      run: |
        set +e
        comment_path="$RS_OUT/comment.md"
        echo "artifact-name=$RS_ARTIFACT" >> "$GITHUB_OUTPUT"
        echo "comment-path=$comment_path" >> "$GITHUB_OUTPUT"
        # Deterministic machine summary from the local packet (no recompute).
        # Pass the SAME --config and --out the generate step used so the summary is
        # projected over the matching config/artifacts (not the consumer repo's).
        summary_json="$(node "$RS_BIN" comment --format json --config "$RS_CONFIG" --out "$RS_OUT" 2>/dev/null)"
        if [ -n "$summary_json" ]; then
          # gate-code is intentionally NOT read here: the renderer projects a clean
          # local-mock context and cannot reproduce a privacy block. The generation
          # step already wrote the REAL gate-code to $GITHUB_OUTPUT (Codex finding 1).
          missing="$(printf '%s' "$summary_json" | jq -r '.requirement_counts.missing // ""')"
          invalid="$(printf '%s' "$summary_json" | jq -r '.requirement_counts.invalid_evidence // ""')"
          # risk-count = sum of the deterministic risk-severity histogram.
          risk="$(printf '%s' "$summary_json" | jq -r '[.risk_severity_histogram[]] | add // 0')"
          echo "missing-count=$missing" >> "$GITHUB_OUTPUT"
          echo "invalid-count=$invalid" >> "$GITHUB_OUTPUT"
          echo "risk-count=$risk" >> "$GITHUB_OUTPUT"
        else
          echo "No packet summary available (best-effort); leaving counts blank."
        fi
        # Append the complete admitted reviewer brief to the run UI.
        if [ -n "$GITHUB_STEP_SUMMARY" ] && [ -f "$comment_path" ] && [ ! -L "$comment_path" ]; then
          # The sticky is already the admitted reviewer brief; do not apply a
          # second arbitrary item cap that could hide an approval decision.
          grep -v '^<!-- review-surfaces:' "$comment_path" 2>/dev/null >> "$GITHUB_STEP_SUMMARY" \
            && echo "Wrote review-surfaces verdict to the run summary." \
            || echo "Could not write run summary (best-effort)."
        else
          echo "No comment.md to summarize (best-effort)."
        fi
        exit 0
    - name: Upload review-surfaces artifact
      uses: actions/upload-artifact@v4
      with:
        # review-surfaces.PR_SURFACE.3: stable PR-keyed name so the next run can
        # recover it for the since-last-review delta. Fork PRs still reach here
        # (upload), they only skip the posting step below.
        name: review-surfaces-pr-${{ inputs.pr-number }}
        path: ${{ inputs.subject-directory }}/${{ steps.generate.outputs.safe-output-dir }}
        # .review-surfaces/ is dot-prefixed; upload-artifact@v4 excludes hidden
        # files by default, so this is required or the artifact is empty.
        include-hidden-files: true
        # Fail loudly if the packet dir is somehow empty — a missing artifact
        # would silently break the since-last-review recovery on the next run.
        if-no-files-found: error
        overwrite: true
    - name: Reconcile sticky comment (trusted exact-head client)
      if: ${{ steps.generate.outcome == 'success' && inputs.post == 'true' }}
      shell: bash
      working-directory: ${{ inputs.subject-directory }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_PR_NUMBER: ${{ inputs.pr-number }}
        GH_REPO: ${{ inputs.repository || github.repository }}
        RS_BIN: ${{ github.action_path }}/bin/review-surfaces.js
        RS_CONFIG: ${{ github.action_path }}/review-surfaces.config.yaml
        RS_OUT: ${{ steps.generate.outputs.safe-output-dir }}
        RS_ARTIFACT: review-surfaces-pr-${{ inputs.pr-number }}
        RS_ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        # review-surfaces.PR_SURFACE.3/.4: only this trusted step holds the write
        # token. The shared CLI owns sticky discovery, freshness, deletion, and
        # upsert semantics, so Actions and local --post cannot drift. A failed
        # generation can never reach this body-posting path.
        set +e
        if [ -z "$GH_TOKEN" ]; then echo "No token; skipping post (upload-only)."; exit 0; fi
        if [ -z "$RS_OUT" ]; then echo "No validated output directory; skipping sticky reconciliation."; exit 0; fi
        node "$RS_BIN" comment \
          --review-scope pr \
          --format sticky \
          --config "$RS_CONFIG" \
          --artifact-name "$RS_ARTIFACT" \
          --artifact-url "$RS_ARTIFACT_URL" \
          --run-id "$GITHUB_RUN_ID" \
          --post \
          --out "$RS_OUT"
        status=$?
        if [ "$status" -ne 0 ]; then
          echo "Sticky reconciliation returned $status (best-effort; generation status remains authoritative)."
        fi
        exit 0
    - name: Remove stale sticky after a confirmed privacy block
      if: ${{ always() && inputs.post == 'true' && steps.generate.outcome == 'failure' && steps.generate.outputs.gate-code == '5' }}
      shell: bash
      working-directory: ${{ inputs.subject-directory }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_PR_NUMBER: ${{ inputs.pr-number }}
        GH_REPO: ${{ inputs.repository || github.repository }}
        RS_HEAD: ${{ inputs.head-ref }}
        RS_STICKY: ${{ github.action_path }}/bin/review-surfaces-sticky.js
      run: |
        # Cleanup is deliberately separate from posting: this client mode can
        # only remove the owned exact-head sticky and has no body-upsert path.
        set +e
        if [ -z "$GH_TOKEN" ]; then echo "No token; skipping privacy cleanup."; exit 0; fi
        head_sha="$(git rev-parse --verify "${RS_HEAD}^{commit}" 2>/dev/null)"
        if [ -z "$head_sha" ]; then echo "Could not resolve exact head; skipping privacy cleanup."; exit 0; fi
        SUBJECT="$(pwd -P)" HEAD_SHA="$head_sha" node "$RS_STICKY" remove || true
        exit 0
