# review-surfaces.PR_SURFACE.1/.3: a reusable composite action that runs the
# local review-surfaces pipeline on a pull request, posts ONE idempotent sticky
# comment rendered from human_review.json, and uploads the full .review-surfaces/
# directory as a workflow artifact. It is a renderer over local artifacts, never a
# separate analysis path: it calls the same CLI commands a local user runs.
#
# Defaults to --provider mock so a consuming repository gets full value with zero
# secrets. The deterministic sticky needs no LLM; an LLM provider only enriches the
# uploaded artifact's narrative and is never required to post.
#
# Fork-handling contract (the caller decides via inputs, the action just obeys):
# pass provider=mock + llm-api-key='' + post=false for fork PRs (upload-only, no
# secrets), and provider=ai-sdk + the key + post=true for same-repo PRs.
name: review-surfaces PR surface
description: Run review-surfaces on a PR, post a sticky human-review summary, and upload the artifact.
# review-surfaces.ACTION_IO.3: a Marketplace-publishable branding block (a valid
# Feather icon + color) so the reusable action can be listed.
branding:
  icon: shield
  color: purple
inputs:
  provider:
    description: review-surfaces provider (mock | ai-sdk | agent-file). Default mock — zero secrets.
    required: false
    default: mock
  model:
    description: LLM model id for --provider ai-sdk (e.g. google:gemini-2.5-flash). Ignored for mock.
    required: false
    default: ""
  llm-api-key:
    description: Optional LLM API key, set as env only for the trusted generation step. Empty for mock.
    required: false
    default: ""
  base-ref:
    description: >-
      Base ref to diff against. Empty (the default) lets the CLI auto-resolve
      the default branch (origin/HEAD, origin/main, origin/master, main,
      master — review-surfaces.COLD_START.6). When set, the ref must be
      fetched in the subject checkout (actions/checkout with fetch-depth: 0,
      or an explicit fetch of the base branch); an unfetched base is a hard,
      actionable error — never a silently wrong review.
    required: false
    default: ""
  head-ref:
    description: Head ref to review.
    required: false
    default: HEAD
  spec:
    description: Feature spec path.
    required: false
    default: features/review-surfaces.feature.yaml
  output-dir:
    description: Output directory for .review-surfaces artifacts.
    required: false
    default: .review-surfaces
  comment-top-n:
    description: How many review-queue items to surface in the sticky comment.
    required: false
    default: "5"
  subject-directory:
    description: Working directory holding the PR code to analyze (the credentialless subject checkout).
    required: false
    default: "."
  pr-number:
    description: PR number, used to key the uploaded artifact and to post the sticky comment.
    required: true
  repository:
    description: owner/repo, used for artifact lookup and comment posting.
    required: false
    default: ${{ github.repository }}
  post:
    description: Whether to upsert the sticky comment (set false for fork PRs — upload only).
    required: false
    default: "true"
  github-token:
    description: Token with pull-requests:write and actions:read, for posting and prior-artifact lookup.
    required: false
    default: ""
# review-surfaces.ACTION_IO.1: declared outputs a consuming workflow can branch
# on, populated from the deterministic packet/gate values by the summary step
# below via $GITHUB_OUTPUT. No recomputation: the values come from the run-summary
# JSON the trusted CLI already produced (comment --format json) and the manifest.
outputs:
  gate-code:
    description: The review-surfaces gate exit code (0 pass; 4 evidence; 5 privacy; 10 quality/risk).
    value: ${{ steps.summary.outputs.gate-code }}
  missing-count:
    description: Number of requirements with status "missing".
    value: ${{ steps.summary.outputs.missing-count }}
  invalid-count:
    description: Number of requirement results with status "invalid_evidence".
    value: ${{ steps.summary.outputs.invalid-count }}
  risk-count:
    description: Number of deterministic (non-hypothesis) risk items in the packet.
    value: ${{ steps.summary.outputs.risk-count }}
  artifact-name:
    description: The uploaded artifact name (review-surfaces-pr-<pr-number>).
    value: ${{ steps.summary.outputs.artifact-name }}
  comment-path:
    description: Path to the rendered sticky comment.md.
    value: ${{ steps.summary.outputs.comment-path }}
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.8.0
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        # No pnpm cache here: github.action_path resolves to `<root>/.` for a
        # `uses: ./` consumer, and setup-node rejects the resulting `/.//` cache
        # pattern. The install below is `--frozen-lockfile`, so it is reliable
        # uncached; consumers that want caching can prime it in their own workflow.
    - name: Build trusted tool
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        pnpm install --frozen-lockfile
        pnpm run build
    - name: Recover previous review packet (since-last-review state)
      id: prior
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ inputs.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        ARTIFACT: review-surfaces-pr-${{ inputs.pr-number }}
        SUBJECT: ${{ inputs.subject-directory }}
      run: |
        # review-surfaces.PR_SURFACE.5: recover the packet from the LAST POSTED
        # sticky, not merely the most recent upload. The posted sticky carries a
        # `run=<id>` fingerprint; we read it and download THAT run's artifact, so a
        # run that uploaded but failed to post never becomes the baseline and the
        # delta is always computed against what the reviewer last saw. A missing
        # sticky / fingerprint / expired artifact (or no token) is the FIRST-REVIEW
        # case, never an error.
        set +e
        prev_dir="$RUNNER_TEMP/rs-prev"
        echo "previous-packet=" >> "$GITHUB_OUTPUT"
        if [ -z "$GH_TOKEN" ]; then
          echo "No token for sticky lookup; treating as first review."; exit 0
        fi
        body="$(gh api --paginate --slurp "repos/$REPO/issues/$PR_NUMBER/comments" 2>/dev/null \
          | jq -r '[.[][] | select(.body | contains("review-surfaces:sticky"))] | last | .body // ""')"
        prior_run="$(printf '%s' "$body" | grep -oE 'review-surfaces:fingerprint[^>]*run=[0-9]+' | grep -oE 'run=[0-9]+' | head -n1 | cut -d= -f2)"
        case "$prior_run" in ""|*[!0-9]*) echo "No prior posted sticky with a run fingerprint; first review."; exit 0 ;; esac
        id="$(gh api "repos/$REPO/actions/runs/$prior_run/artifacts" \
          --jq ".artifacts[] | select(.name==\"$ARTIFACT\") | .id" 2>/dev/null | head -n1)"
        case "$id" in ""|null|*[!0-9]*) echo "Prior sticky run $prior_run has no recoverable artifact (expired?); first review."; exit 0 ;; esac
        rm -rf "$prev_dir" && mkdir -p "$prev_dir"
        if gh api "repos/$REPO/actions/artifacts/$id/zip" > "$RUNNER_TEMP/rs-prev.zip" 2>/dev/null \
          && unzip -q -o "$RUNNER_TEMP/rs-prev.zip" -d "$prev_dir" 2>/dev/null \
          && [ -f "$prev_dir/review_packet.json" ]; then
          echo "previous-packet=$prev_dir" >> "$GITHUB_OUTPUT"
          echo "Recovered the last posted sticky's packet from run $prior_run (artifact #$id)."
        else
          echo "Prior artifact present but unreadable; first-review fallback."
        fi
    - name: Generate PR review surface (trusted tool)
      shell: bash
      working-directory: ${{ inputs.subject-directory }}
      # All caller-supplied inputs flow through env, never interpolated into the
      # script: a ref name can contain shell metacharacters such as $(...), so
      # `--head ${{ inputs.head-ref }}` would let a PR-controlled ref execute code
      # in this step (which also holds the LLM key). Referenced below as "$VAR".
      env:
        RS_BIN: ${{ github.action_path }}/bin/review-surfaces.js
        RS_CONFIG: ${{ github.action_path }}/review-surfaces.config.yaml
        GOOGLE_GENERATIVE_AI_API_KEY: ${{ inputs.llm-api-key }}
        PREVIOUS_PACKET: ${{ steps.prior.outputs.previous-packet }}
        RS_PROVIDER: ${{ inputs.provider }}
        RS_MODEL: ${{ inputs.model }}
        RS_BASE: ${{ inputs.base-ref }}
        RS_HEAD: ${{ inputs.head-ref }}
        RS_SPEC: ${{ inputs.spec }}
        RS_OUT: ${{ inputs.output-dir }}
        RS_TOP_N: ${{ inputs.comment-top-n }}
        RS_ARTIFACT: review-surfaces-pr-${{ inputs.pr-number }}
      run: |
        prev_flag=()
        if [ -n "$PREVIOUS_PACKET" ]; then prev_flag=(--previous-packet "$PREVIOUS_PACKET"); fi
        model_flag=()
        if [ -n "$RS_MODEL" ]; then model_flag=(--model "$RS_MODEL"); fi
        # review-surfaces.COLD_START.6: pass --base only when the caller set
        # base-ref, so the default run uses the CLI's auto-resolution chain
        # (origin/HEAD, origin/main, origin/master, main, master) instead of a
        # hard-coded origin/main that fails on master-default repositories.
        # A default actions/checkout fetches a single ref at depth 1, leaving
        # NO base candidate and no merge-base history, so the default path
        # fetches the remote default branch (and unshallows) first —
        # best-effort: if it still cannot resolve, the CLI's hard preflight
        # error names the fix instead of producing a silently wrong review.
        base_flag=()
        if [ -n "$RS_BASE" ]; then
          base_flag=(--base "$RS_BASE")
        else
          default_branch="$(git ls-remote --symref origin HEAD 2>/dev/null | awk '/^ref:/ {sub("refs/heads/","",$2); print $2; exit}')"
          if [ -n "$default_branch" ]; then
            git fetch --no-tags origin "+refs/heads/$default_branch:refs/remotes/origin/$default_branch" 2>/dev/null || true
          fi
          if [ "$(git rev-parse --is-shallow-repository 2>/dev/null)" = "true" ]; then
            git fetch --unshallow --no-tags origin 2>/dev/null || true
          fi
        fi
        node "$RS_BIN" all \
          --provider "$RS_PROVIDER" \
          "${model_flag[@]}" \
          --config "$RS_CONFIG" \
          --redact-secrets true \
          "${base_flag[@]}" \
          --head "$RS_HEAD" \
          --spec "$RS_SPEC" \
          --dogfood \
          --review-scope pr \
          "${prev_flag[@]}" \
          --out "$RS_OUT"
        node "$RS_BIN" validate "$RS_OUT"
        # review-surfaces.PR_SURFACE.2/.4: render the deterministic sticky from
        # human_review.json. Redaction and the secret-block postability gate run
        # inside the renderer; --strict-postability makes a blocked body a non-zero
        # exit so the action fails before the later upload/post steps run — a
        # blocked sticky is never posted. Suggested comments stay local drafts
        # (PROVIDERS.7) and are never posted here.
        node "$RS_BIN" comment \
          --review-scope pr \
          --format sticky \
          --strict-postability \
          --comment-top-n "$RS_TOP_N" \
          --artifact-name "$RS_ARTIFACT" \
          --run-id "$GITHUB_RUN_ID" \
          --out "$RS_OUT"
    - name: Emit outputs and run-UI summary (best-effort, renderer-only)
      id: summary
      shell: bash
      working-directory: ${{ inputs.subject-directory }}
      # review-surfaces.ACTION_IO.1: populate the declared outputs from the
      # deterministic run-summary JSON (comment --format json) — a RENDERER over
      # the local packet, no network and no recomputation.
      # review-surfaces.ACTION_IO.2: append the rendered comment.md (trimmed) to
      # $GITHUB_STEP_SUMMARY so the verdict shows in the Actions run UI even on
      # fork PRs where the comment is never posted. Best-effort: a missing packet
      # or summary never fails the action.
      env:
        RS_BIN: ${{ github.action_path }}/bin/review-surfaces.js
        RS_OUT: ${{ inputs.output-dir }}
        RS_ARTIFACT: review-surfaces-pr-${{ inputs.pr-number }}
        RS_TOP_N: ${{ inputs.comment-top-n }}
      run: |
        set +e
        comment_path="$RS_OUT/comment.md"
        echo "artifact-name=$RS_ARTIFACT" >> "$GITHUB_OUTPUT"
        echo "comment-path=$comment_path" >> "$GITHUB_OUTPUT"
        # Deterministic machine summary from the local packet (no recompute).
        summary_json="$(node "$RS_BIN" comment --format json --out "$RS_OUT" 2>/dev/null)"
        if [ -n "$summary_json" ]; then
          gate="$(printf '%s' "$summary_json" | jq -r '.gate_code // ""')"
          missing="$(printf '%s' "$summary_json" | jq -r '.requirement_counts.missing // ""')"
          invalid="$(printf '%s' "$summary_json" | jq -r '.requirement_counts.invalid // ""')"
          # risk-count = sum of the deterministic risk-severity histogram.
          risk="$(printf '%s' "$summary_json" | jq -r '[.risk_severity_histogram[]] | add // 0')"
          echo "gate-code=$gate" >> "$GITHUB_OUTPUT"
          echo "missing-count=$missing" >> "$GITHUB_OUTPUT"
          echo "invalid-count=$invalid" >> "$GITHUB_OUTPUT"
          echo "risk-count=$risk" >> "$GITHUB_OUTPUT"
        else
          echo "No packet summary available (best-effort); leaving counts blank."
        fi
        # Append the rendered sticky (trimmed to the top N lines) to the run UI.
        if [ -n "$GITHUB_STEP_SUMMARY" ] && [ -f "$comment_path" ] && [ ! -L "$comment_path" ]; then
          # Strip the sticky HTML marker line, keep a bounded slice so a long
          # comment never floods the run summary.
          lines=$(( ${RS_TOP_N:-5} * 8 + 40 ))
          grep -v '^<!-- review-surfaces:' "$comment_path" 2>/dev/null | head -n "$lines" >> "$GITHUB_STEP_SUMMARY" \
            && echo "Wrote review-surfaces verdict to the run summary." \
            || echo "Could not write run summary (best-effort)."
        else
          echo "No comment.md to summarize (best-effort)."
        fi
        exit 0
    - name: Upload review-surfaces artifact
      uses: actions/upload-artifact@v4
      with:
        # review-surfaces.PR_SURFACE.3: stable PR-keyed name so the next run can
        # recover it for the since-last-review delta. Fork PRs still reach here
        # (upload), they only skip the posting step below.
        name: review-surfaces-pr-${{ inputs.pr-number }}
        path: ${{ inputs.subject-directory }}/${{ inputs.output-dir }}
        # .review-surfaces/ is dot-prefixed; upload-artifact@v4 excludes hidden
        # files by default, so this is required or the artifact is empty.
        include-hidden-files: true
        # Fail loudly if the packet dir is somehow empty — a missing artifact
        # would silently break the since-last-review recovery on the next run.
        if-no-files-found: error
        overwrite: true
    - name: Upsert sticky comment (trusted gh over the generated file)
      if: ${{ inputs.post == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ inputs.pr-number }}
        REPO: ${{ inputs.repository }}
        BODY: ${{ inputs.subject-directory }}/${{ inputs.output-dir }}/comment.md
      run: |
        # review-surfaces.PR_SURFACE.3/.4: only THIS step holds the write token and
        # it runs `gh` (trusted) over the generated comment.md — never PR code — so
        # a tampered CLI entrypoint cannot reach the token. Best-effort: a
        # missing/symlinked body or a transient API failure never fails the check.
        set +e
        if [ -z "$GH_TOKEN" ]; then echo "No token; skipping post (upload-only)."; exit 0; fi
        if [ -z "$GITHUB_WORKSPACE" ] || [ -L "$BODY" ] || [ ! -f "$BODY" ]; then
          echo "comment.md missing or a symlink; skipping post (best-effort)"; exit 0
        fi
        case "$(realpath "$BODY" 2>/dev/null)" in
          "$GITHUB_WORKSPACE"/*) : ;;
          *) echo "comment.md resolves outside the workspace; skipping post"; exit 0 ;;
        esac
        marker='<!-- review-surfaces:sticky -->'
        if [ "$(head -n 1 "$BODY" 2>/dev/null)" != "$marker" ]; then
          echo "comment.md missing sticky marker; skipping post"; exit 0
        fi
        id="$(gh api --paginate --slurp "repos/$REPO/issues/$PR_NUMBER/comments" 2>/dev/null \
          | jq -r "[.[][] | select(.body | contains(\"$marker\")) | .id] | last // \"\"")"
        case "$id" in ""|*[!0-9]*) id="" ;; esac
        if [ -n "$id" ]; then
          gh api --method PATCH "repos/$REPO/issues/comments/$id" -F "body=@$BODY" >/dev/null 2>&1 \
            && echo "updated sticky comment #$id" || echo "warning: sticky update failed (best-effort)"
        else
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" -F "body=@$BODY" >/dev/null 2>&1 \
            && echo "posted sticky comment" || echo "warning: sticky post failed (best-effort)"
        fi
        exit 0
